<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>드로잉엣홈 대시보드</title>
<style>

 
:root{--font-base:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif}

 

 
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-base)var(--font-base);
  background:#F5F0EB;
  color:#282828;
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh
}

 
:root{
  --stage-상담:     #5C7A9F;
  --stage-계약금:   #F06E2D;
  --stage-실측:     #8B6BB1;
  --stage-잔금:     #2E7D6B;
  --stage-시공:     #C0392B;
  --stage-완료:     #B0A99F;
}

 
.login-screen{
  position:fixed;inset:0;
  background:#F5F0EB;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:999;padding:0 24px
}
.login-logo-wrap{text-align:center;margin-bottom:36px}
.login-logo-wrap img{height:28px;width:auto;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.login-brand-sub{font-size:12px;letter-spacing:3px;color:#B0A99F;text-transform:uppercase}
.login-card{
  background:#fff;border-radius:16px;
  border:1px solid #EEE6DC;
  padding:28px;width:100%;max-width:320px;
  box-shadow:0 4px 24px rgba(0,0,0,0.08)
}
.login-sub{font-size:13px;color:#B0A99F;text-align:center;margin-bottom:16px}
.user-btn{
  width:100%;display:flex;align-items:center;gap:14px;
  padding:15px 18px;border-radius:8px;
  border:1.5px solid #EEE6DC;background:#fff;
  cursor:pointer;text-align:left;font-family:inherit;
  transition:all 0.15s
}
.user-btn:hover{border-color:#282828;background:#FAF7F5}
.user-btn.master{border-color:#F06E2D;background:#FAF7F5}
.user-btn-icon{font-size:22px;flex-shrink:0}
.user-btn-name{display:block;font-size:15px;font-weight:700;color:#282828;margin-bottom:2px}
.user-btn-desc{display:block;font-size:12px;color:#B0A99F}
.master-pw-wrap{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.master-pw-wrap input{
  width:100%;height:42px;padding:0 14px;
  border:1.5px solid #EEE6DC;border-radius:10px;
  font-size:15px;font-family:inherit;outline:none
}
.master-pw-wrap input:focus{border-color:#F06E2D}
.master-pw-wrap button{
  width:100%;height:42px;background:#282828;color:#fff;
  border:none;border-radius:10px;
  font-size:15px;font-weight:700;font-family:inherit;cursor:pointer
}
.master-pw-error{font-size:12px;color:#F06E2D;text-align:center;display:none}

 
.hd{
  position:sticky;top:0;z-index:100;
  background:#282828;
  height:56px;
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid rgba(255,255,255,0.06)
}
.hd-logo-img{height:26px;width:auto;filter:brightness(0) invert(1);opacity:0.95;flex-shrink:0}
.hd-right{display:flex;align-items:center;gap:8px}
.hd-badge{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.3px;flex-shrink:0}
.hd-btn{
  height:40px;padding:0 13px;
  font-size:12px;font-weight:600;font-family:inherit;
  border-radius:6px;cursor:pointer;
  white-space:nowrap;border:none;flex-shrink:0;
  letter-spacing:0.3px
}
.hd-btn-sub{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5)}
.hd-btn-new{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9)}
.hd-btn-est{background:#F06E2D;color:#fff;font-weight:700}

 
.kpi-bar{
  background:#282828;
  padding:12px 16px 14px;
  position:sticky;top:56px;z-index:99
}
.kpi-grid{display:grid;grid-template-columns:3fr 2fr;gap:8px;margin-bottom:8px}
.kpi-card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;padding:14px 16px
}
.kpi-card.main{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12)}

.kpi-num{font-size:32px;font-weight:900;color:#fff;line-height:1;display:block;margin-bottom:2px;letter-spacing:-1.5px}
.kpi-num em,.kpi-num-unit{font-size:13px;font-weight:400;opacity:0.45;font-style:normal;letter-spacing:0}
.kpi-label{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:8px;display:block}
.kpi-progress-wrap{display:none}
.kpi-progress-bar{display:none}

 
.stage-chips{display:flex;gap:4px}
.sc{
  flex:1;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:8px 2px 6px;
  text-align:center;cursor:pointer;
  transition:all 0.15s
}
.sc:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.2)}
.sc.active{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.3);box-shadow:0 0 0 1px rgba(255,255,255,0.15)}
.sc.has-count{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15)}
.sc[data-s="상담"].has-count  {border-color:rgba(92,122,159,0.6);background:rgba(92,122,159,0.2)}
.sc[data-s="계약금"].has-count{border-color:rgba(240,110,45,0.6);background:rgba(240,110,45,0.2)}
.sc[data-s="실측"].has-count  {border-color:rgba(139,107,177,0.6);background:rgba(139,107,177,0.2)}
.sc[data-s="잔금"].has-count  {border-color:rgba(46,125,107,0.6);background:rgba(46,125,107,0.2)}
.sc[data-s="시공"].has-count  {border-color:rgba(192,57,43,0.6);background:rgba(192,57,43,0.2)}
.sc-n{font-size:17px;font-weight:900;color:#fff;display:block;line-height:1.2;letter-spacing:-0.5px}
.sc-n.zero{color:rgba(255,255,255,0.15);font-size:14px;font-weight:300}
.sc-l{font-size:10px;color:rgba(255,255,255,0.4);display:block;margin-top:2px;letter-spacing:0.3px}

 
.tabs{
  background:#fff;
  border-bottom:1px solid #EEE6DC;
  display:flex;
  position:sticky;top:0;z-index:98;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:44px;height:44px;
  font-size:13px;font-weight:600;font-family:inherit;
  color:#B0A99F;background:none;border:none;
  border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap
}
.tab.on,.tab.active{color:#F06E2D;border-bottom-color:#F06E2D;font-weight:700}

 
.today-banner{
  background:#fff;
  border-bottom:1px solid #EEE6DC;
  padding:12px 16px;
  display:flex;align-items:center;gap:10px
}
.today-date{
  font-size:24px;font-weight:900;color:#282828;
  letter-spacing:-1px;line-height:1
}
.today-dow{
  font-size:12px;font-weight:700;
  color:#F06E2D;letter-spacing:1.5px;
  text-transform:uppercase
}
.today-sub{font-size:12px;color:#B0A99F;margin-left:auto}

 
.wrap{padding:12px 0 80px;max-width:640px;margin:0 auto;background:#E8E3DC}

 
.card{
  background:#fff;
  border-top:1px solid #EEE6DC;
  border-bottom:1px solid #EEE6DC;
  margin-bottom:8px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05)
}
.card-head{
  padding:12px 16px 11px;
  background:#FAF7F5;
  border-bottom:1px solid #EEE6DC;
  display:flex;align-items:center;
  justify-content:space-between
}
.card-head-row{
  display:flex;align-items:center;
  justify-content:space-between;width:100%
}
.card-title,.card-label{
  font-size:11px;font-weight:700;
  color:#B0A99F;letter-spacing:1px;
  text-transform:uppercase
}
.card-count{font-size:12px;color:#B0A99F}
.sec{
  font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:#B0A99F;
  padding:12px 16px 8px
}

 
.new-est-btn{
  display:flex;align-items:center;justify-content:center;
  width:calc(100% - 28px);margin:0 14px 8px;
  height:48px;
  background:#282828;color:#fff;
  border:none;border-radius:8px;
  font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;letter-spacing:0.3px
}
.new-est-btn:active{background:#282828}

 
.action-item{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:13px 16px;
  border-bottom:1px solid #EEE6DC;
  cursor:pointer
}
.action-item:last-child{border-bottom:none}
.ai-left{display:flex;align-items:flex-start;flex:1;min-width:0}
.ai-bar{
  width:3px;min-height:38px;border-radius:2px;
  flex-shrink:0;margin-right:12px;margin-top:1px;
  background:#EEE6DC
}
.ai-bar.warn{background:#F06E2D}
.ai-name{
  font-size:15px;font-weight:700;color:#282828;
  margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.ai-meta{font-size:13px;color:#6B6B6B;line-height:1.6}
.ai-tag{
  display:inline-block;
  background:#F5F0EB;border:1px solid #EEE6DC;
  border-radius:4px;font-size:11px;color:#6B6B6B;
  padding:1px 6px;margin-left:5px;
  vertical-align:middle;white-space:nowrap
}
.ai-tag.today{background:#FAF7F5;border-color:#EEE6DC;color:#F06E2D}
.stage-btn{
  font-size:12px;font-weight:700;font-family:inherit;
  padding:5px 11px;border-radius:6px;
  border:none;
  color:#fff;white-space:nowrap;cursor:pointer;
  flex-shrink:0;margin-left:10px
}
.stage-btn.urgent{background:#F06E2D}
.stage-btn.today-badge{background:#F06E2D}

 
.stage-btn[data-stage="상담"]  { background:var(--stage-상담); }
.stage-btn[data-stage="계약금"]{ background:var(--stage-계약금); }
.stage-btn[data-stage="실측"]  { background:var(--stage-실측); }
.stage-btn[data-stage="잔금"]  { background:var(--stage-잔금); }
.stage-btn[data-stage="시공"]  { background:var(--stage-시공); }
.stage-btn[data-stage="완료"]  { background:var(--stage-완료); }

 
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr)}
.stat-item{
  padding:14px 8px;text-align:center;
  border-right:1px solid #EEE6DC
}
.stat-item:last-child{border-right:none}
.stat-val{
  font-size:18px;font-weight:800;color:#282828;
  display:block;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:-0.5px
}
.stat-lbl{font-size:11px;color:#9A9490;letter-spacing:0.3px}

 
.perf-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 16px;border-bottom:1px solid #EEE6DC;
  cursor:pointer;transition:background 0.12s ease
}
.perf-item:last-child{border-bottom:none}
.perf-item:hover{background:#FAF7F5}
.perf-name{font-size:14px;font-weight:700;color:#282828}
.perf-right{text-align:right}
.perf-rev{font-size:17px;font-weight:800;color:#282828;letter-spacing:-0.5px}
.perf-sub{font-size:12px;color:#B0A99F;margin-top:2px}

 
.pipe-stage-head{
  padding:10px 16px;
  background:#F5F0EB;
  border-top:1px solid #EEE6DC;
  border-bottom:1px solid #EEE6DC;
  display:flex;align-items:center;
  justify-content:space-between
}
.pipe-stage-label{
  font-size:13px;font-weight:700;color:#282828;
  display:flex;align-items:center;gap:8px
}
.pipe-stage-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:#282828;color:#fff;
  font-size:12px;font-weight:800;flex-shrink:0
}
.pipe-stage-num.empty{background:#EEE6DC}
.pipe-stage-count{font-size:12px;color:#B0A99F}
.pipe-item{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:13px 16px;
  border-bottom:1px solid #EEE6DC;
  cursor:pointer
}
.pipe-item:last-child{border-bottom:none}

.pipe-left{flex:1;min-width:0}
.pipe-name{
  font-size:15px;font-weight:700;color:#282828;
  margin-bottom:4px;
  display:flex;align-items:center;gap:7px
}
.pipe-sub{font-size:13px;color:#B0A99F}
.pipe-right{text-align:right;flex-shrink:0;margin-left:12px}
.pipe-price{font-size:16px;font-weight:800;color:#282828;margin-bottom:4px;letter-spacing:-0.5px}
.pipe-date{font-size:12px;color:#B0A99F}

 
.stage-pill{
  display:inline-flex;align-items:center;justify-content:center;
  padding:3px 9px;border-radius:6px;
  font-size:12px;font-weight:700;color:#fff;
  flex-shrink:0;white-space:nowrap
}
.stage-pill.상담 {background:#5C7A9F;color:#fff}
.stage-pill.계약금{background:#F06E2D;color:#fff}
.stage-pill.실측  {background:#8B6BB1;color:#fff}
.stage-pill.잔금  {background:#2E7D6B;color:#fff}
.stage-pill.시공  {background:#C0392B;color:#fff}
.stage-pill.완료  {background:#B0A99F;color:#fff}

 
.search-top{padding:10px 14px 8px;background:#fff;border-bottom:1px solid #EEE6DC;margin-bottom:8px}
.search-bar-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none}
.search-input-clean{
  width:100%;height:42px;
  padding:0 14px 0 36px;
  border:1.5px solid #EEE6DC;border-radius:8px;
  background:#fff;font-size:15px;font-family:inherit;
  color:#282828;outline:none
}
.search-input-clean:focus{border-color:#F06E2D}
.archived-check{
  display:flex;align-items:center;gap:7px;
  font-size:13px;color:#B0A99F;cursor:pointer;
  margin-top:8px
}
.archived-check input[type="checkbox"]{width:14px;height:14px;accent-color:#282828;cursor:pointer}
.cust-item{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:13px 16px;
  border-bottom:1px solid #EEE6DC;cursor:pointer;
  transition:background 0.12s ease
}
.cust-item:last-child{border-bottom:none}
.cust-item:active{background:#FAF7F5}
.cust-item:hover{background:#FAF7F5}
.ci-left{flex:1;min-width:0}
.ci-name{
  font-size:15px;font-weight:700;color:#282828;
  margin-bottom:4px;
  display:flex;align-items:center;gap:7px
}
.ci-sub{font-size:13px;color:#B0A99F}
.ci-right{text-align:right;flex-shrink:0;margin-left:12px}
.ci-price{font-size:16px;font-weight:800;color:#282828;margin-bottom:4px;letter-spacing:-0.5px}
.ci-stage{font-size:12px;font-weight:700}

 
.rebuy-tag{
  font-size:11px;font-weight:700;
  background:#FAF7F5;color:#F06E2D;
  border:1px solid #EEE6DC;border-radius:4px;
  padding:2px 6px;flex-shrink:0
}

 
.cal-day-cell{
  min-height:52px;display:flex;flex-direction:column;
  align-items:stretch;padding:3px 2px;
  cursor:pointer;border-radius:6px;position:relative
}
.cal-day-cell:hover{background:#FAF7F5}
.cal-day-num{
  font-size:13px;font-weight:600;color:#282828;
  width:24px;height:24px;display:flex;
  align-items:center;justify-content:center;
  border-radius:50%;line-height:1;flex-shrink:0;
  align-self:center
}
.cal-day-cell.today .cal-day-num{
  background:#282828;color:#fff;font-weight:800
}
.cal-day-cell.other-month .cal-day-num{color:#D0C8C0}
.cal-day-cell.selected .cal-day-num{
  background:#F06E2D;color:#fff;font-weight:800
}
.cal-day-cell.today.selected .cal-day-num{
  background:#F06E2D;color:#fff
}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:2px}
.cal-dot{width:5px;height:5px;border-radius:50%}

 
.cal-ev-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border-bottom:1px solid #EEE6DC;cursor:pointer
}
.cal-ev-row:last-child{border-bottom:none}
.cal-ev-row:active{background:#FAF7F5}
.cal-ev-date{text-align:center;min-width:24px;flex-shrink:0}
.cal-ev-day{font-size:15px;font-weight:800;color:#282828;display:block;line-height:1.2}
.cal-ev-dow{font-size:11px;color:#B0A99F;display:block}
.cal-ev-type{width:3px;min-height:38px;border-radius:2px;flex-shrink:0}
.type-상담{background:#282828}
.type-실측{background:#6B6B6B}
.type-시공{background:#F06E2D}
.cal-ev-info{flex:1;min-width:0}
.cal-ev-name{
  font-size:15px;font-weight:700;color:#282828;
  margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.cal-ev-sub{font-size:13px;color:#B0A99F}
.cal-ev-badge{
  font-size:12px;font-weight:700;
  padding:4px 9px;border-radius:6px;
  color:#fff;white-space:nowrap;flex-shrink:0
}

 
.chart-tab-bar{display:flex;background:#fff;border-bottom:1px solid #EEE6DC;margin-bottom:8px}
.chart-tab{
  flex:1;padding:13px 0;
  font-size:14px;font-weight:600;font-family:inherit;
  text-align:center;cursor:pointer;
  color:#B0A99F;border:none;background:transparent;
  border-bottom:2px solid transparent
}
.chart-tab.on{color:#F06E2D;border-bottom-color:#F06E2D;font-weight:700}
.chart-bar{background:#F06E2D;border-radius:4px 4px 0 0;transition:height 0.3s}
#chart-bars{padding:0 16px;margin:0}

 
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.65);
  z-index:200;display:none;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(2px)
}
.overlay.open{display:flex}
.modal-box{
  background:#fff;width:100%;max-width:640px;
  border-radius:16px 16px 0 0;
  max-height:90vh;overflow-y:auto;
  padding-bottom:env(safe-area-inset-bottom,0)
}
.modal-top-bar{
  width:40px;height:4px;border-radius:2px;
  background:#EEE6DC;margin:12px auto 0
}

 
.form-row{margin-bottom:16px}
.form-row:last-child{margin-bottom:0}
.form-label{font-size:12px;font-weight:700;color:#6B6B6B;display:block;margin-bottom:8px;letter-spacing:0.3px}
.form-required{color:#F06E2D}
.form-input{
  width:100%;height:44px;padding:0 14px;
  border:1.5px solid #EEE6DC;border-radius:8px;
  font-size:15px;font-family:inherit;
  background:#fff;color:#282828;outline:none;
  -webkit-appearance:none
}
.form-input:focus{border-color:#F06E2D}

 
.staff-btn{
  flex:1;padding:10px 12px;border-radius:8px;
  border:1.5px solid #EEE6DC;background:#FAF7F5;
  font-size:14px;font-weight:600;font-family:inherit;
  color:#282828;cursor:pointer;text-align:center
}
.staff-btn.on{background:#282828;border-color:#282828;color:#fff}

 
.badge{
  font-size:12px;font-weight:700;
  padding:4px 9px;border-radius:6px;
  white-space:nowrap;display:inline-block;
  color:#fff
}

 
.settings-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;border-bottom:1px solid #EEE6DC
}
.settings-row:last-child{border-bottom:none}

 

.master-only{display:none}
.role-master 
.role-master .stat-grid

 
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  background:#282828;color:#fff;
  padding:11px 22px;border-radius:22px;
  font-size:14px;font-weight:600;
  opacity:0;pointer-events:none;
  z-index:999;white-space:nowrap;
  transition:opacity 0.2s;
  box-shadow:0 4px 16px rgba(0,0,0,0.2)
}

 

 
.empty-state{text-align:center;padding:48px 24px}
.empty-state-emoji{font-size:44px;margin-bottom:16px;display:block;opacity:0.5}
.empty-state-title{font-size:16px;font-weight:700;color:#282828;margin-bottom:8px}
.empty-state-desc{font-size:13px;color:#B0A99F;line-height:1.7}
.empty-state-btn{
  display:inline-block;margin-top:16px;
  padding:10px 20px;background:#282828;color:#fff;
  border-radius:8px;font-size:14px;font-weight:700;
  font-family:inherit;border:none;cursor:pointer
}

 
input:focus,select:focus,textarea:focus{
  outline:2px solid #282828;outline-offset:1px;border-radius:4px
}

.alim-tag.알림{background:#FFF3E0;color:#E65100;border:1px solid #FFB74D;font-weight:700}
.alim-tag.자동{background:#282828;color:#fff}

 
.notice-card{
  background:#fff;
  border-left:3px solid #E65100;
  border-radius:0 8px 8px 0;
  margin-bottom:8px
}
.notice-item{
  display:flex;align-items:flex-start;
  justify-content:space-between;
  padding:14px 16px;
  border-bottom:1px solid #F5F0EB;
  cursor:pointer;gap:10px
}
.notice-item:last-child{border-bottom:none}
.notice-item:active{background:#FFF8F5}
.notice-badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:#E65100;color:#fff;
  font-size:10px;font-weight:800;
  border-radius:6px;padding:2px 7px;
  flex-shrink:0;margin-top:1px
}
.notice-name{font-size:14px;font-weight:700;color:#282828;margin-bottom:2px}
.notice-msg{font-size:12px;color:#6B6B6B;line-height:1.5}
.notice-send-btn{
  background:#282828;color:#fff;
  border:none;border-radius:6px;
  font-size:12px;font-weight:700;font-family:inherit;
  padding:7px 12px;cursor:pointer;
  flex-shrink:0;white-space:nowrap;min-height:44px
}
.notice-send-btn:active{background:#444}

 
.rev-bar-wrap{
  margin-top:8px;background:rgba(255,255,255,0.15);
  border-radius:3px;height:3px;overflow:hidden
}
.rev-bar-fill{
  height:3px;background:#fff;border-radius:3px;
  transition:width 0.6s ease
}
.kpi-sub-row{
  display:flex;justify-content:space-between;
  align-items:center;margin-top:4px
}
.kpi-sub-pct{
  font-size:11px;color:rgba(255,255,255,0.6);font-weight:700
}
.kpi-sub-goal{
  font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:0.3px
}

 

 
button{transition:transform 0.1s ease,opacity 0.1s ease,box-shadow 0.1s ease}
button:active{transform:scale(0.96);opacity:0.85}

 
.btn-save:active{transform:scale(0.97);box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.btn-print:active{transform:scale(0.97)}
.hd-btn:active{transform:scale(0.95)}

 

.pipe-item:hover{background:#F8F4F1;transform:translateX(2px)}

.action-item:hover{background:#FAF7F5}
.cust-load-item{transition:background 0.12s ease}
.cust-load-item:hover{background:#FAF7F5}
.cal-ev-row:hover{background:#FAF7F5}

 
.est-status-btn{transition:all 0.2s ease}
.est-status-btn.on{transition:all 0.2s ease}

.tab.on::after{transition:width 0.2s ease}

 
.info-item{transition:background 0.15s ease}
.info-item:focus-within{background:#FAFAF8}
input,select,textarea{transition:border-color 0.15s ease}

 
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.section{animation:fadeSlideUp 0.25s ease both}

 
@keyframes numPulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.04)}
  100%{transform:scale(1)}
}
.summary-total-amount.updated{animation:numPulse 0.3s ease}

 
@keyframes fadeInUp{
  
  
}
@keyframes fadeOutDown{
  
  
}

 
.notice-card{animation:fadeSlideUp 0.2s ease both}
.notice-item{transition:background 0.12s ease}

 
.tbl-outer::after{transition:opacity 0.2s ease}

 

.rev-bar-fill{transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}

 

.pipe-item 
.pipe-item .stage-pill:hover{opacity:0.8}

 

.hd-btn:hover{opacity:0.85}

.sc.on{transition:all 0.15s ease}

</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-screen" id="login-screen">
  <div class="login-logo-wrap">
    <img src="https://raw.githubusercontent.com/drawingathome/dah-estimate-/main/logo.png" alt="드로잉엣홈">
    <div class="login-brand-sub">Curtain Studio Since 2012</div>
  </div>
  <div class="login-card">
    <div class="login-sub" style="margin-bottom:20px">계정을 선택하세요</div>
    <button class="user-btn master" id="btn-master-login">
      <span class="user-btn-icon">👑</span>
      <div>
        <span class="user-btn-name">마스터</span>
        <span class="user-btn-desc">전체 현황 + 관리 기능</span>

      <button id="btn-master-confirm">확인</button>

    </div>
    <div id="staff-login-list"></div>
  </div>
</div>

<div class="hd" id="hd">
  <img src="https://raw.githubusercontent.com/drawingathome/dah-estimate-/main/logo.png" alt="드로잉엣홈" class="hd-logo-img">
  <div class="hd-right">
    <span class="hd-badge" id="current-user-badge"></span>
    <button class="hd-btn hd-btn-sub" id="btn-backup">백업</button>
    <button class="hd-btn hd-btn-new" id="btn-add-customer">+ 고객</button>
    <button class="hd-btn hd-btn-est" onclick="openEstimate(null)">견적서</button>
  </div>
</div>
<div class="kpi-bar" id="kpi-bar">
  <!-- 목표 잔액 카피 -->
  <div id="kpi-goal-copy" style="padding:10px 0 8px;font-size:14px;font-weight:700;color:rgba(255,255,255,0.85);letter-spacing:-0.3px;line-height:1.4"></div>
  <div class="kpi-grid">
    <div class="kpi-card main">
      <span class="kpi-label">이달 매출</span>
      <span class="kpi-num" id="hd-kpi-rev">—<em class="kpi-num-unit">만원</em></span>
      <div class="rev-bar-wrap"><div class="rev-bar-fill" id="kpi-rev-bar" style="width:0%"></div></div>
      <div class="kpi-sub-row">
        <span class="kpi-sub-pct" id="kpi-rev-pct">0%</span>
        <span class="kpi-sub-goal" id="kpi-rev-goal">목표 —</span>
      </div>
    </div>
    <div class="kpi-card">
      <span class="kpi-label">계약 / 상담</span>
      <span class="kpi-num" id="hd-kpi-con">—<em>건</em></span>
    </div>
  </div>
  <div class="kpi-progress-3" id="kpi-progress-3" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">
    <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:10px 12px">
      <div style="font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">연간</div>
      <div style="font-size:16px;font-weight:900;color:#fff;letter-spacing:-0.5px;margin-bottom:4px" id="kpi-year-rev">—</div>
      <div style="height:2px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden;margin-bottom:4px">
        <div id="kpi-year-bar" style="height:2px;background:#F06E2D;border-radius:2px;width:0%;transition:width 0.6s ease"></div>
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,0.4)" id="kpi-year-pct">0% 달성</div>
    </div>
    <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:10px 12px">
      <div style="font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">분기</div>
      <div style="font-size:16px;font-weight:900;color:#fff;letter-spacing:-0.5px;margin-bottom:4px" id="kpi-qtr-rev">—</div>
      <div style="height:2px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden;margin-bottom:4px">
        <div id="kpi-qtr-bar" style="height:2px;background:#F06E2D;border-radius:2px;width:0%;transition:width 0.6s ease"></div>
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,0.4)" id="kpi-qtr-pct">0% 달성</div>
    </div>
    <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:10px 12px">
      <div style="font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">월간</div>
      <div style="font-size:16px;font-weight:900;color:#fff;letter-spacing:-0.5px;margin-bottom:4px" id="kpi-mon-rev">—</div>
      <div style="height:2px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden;margin-bottom:4px">
        <div id="kpi-mon-bar" style="height:2px;background:#F06E2D;border-radius:2px;width:0%;transition:width 0.6s ease"></div>
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,0.4)" id="kpi-mon-pct">0% 달성</div>
    </div>
  </div>
  <div class="stage-chips" id="hd-stages-bar"></div>
</div>
<div class="tabs">
  <button class="tab on" data-tab="home">홈</button>
  <button class="tab" data-tab="pipe">진행현황</button>
  <button class="tab" data-tab="est-list">견적서</button>
  <button class="tab" data-tab="search">고객목록</button>
  <button class="tab" data-tab="cal">일정</button>
  <button class="tab" data-tab="chart">매출</button>
  <button class="tab" data-tab="settings">설정</button>
</div>

<div id="home" class="wrap"></div>
<div id="pipe" style="display:none" class="wrap">
  <div class="search-top" style="padding:10px 12px 8px">
    <div class="search-bar-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B0A99F" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="pipe-search" class="search-input-clean" placeholder="고객명 검색">
    </div>
  </div>
  <div id="pipe-list"></div>
</div>
<div id="est-list" style="display:none" class="wrap">
  <div class="search-top" style="padding:10px 12px 8px">
    <div class="search-bar-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B0A99F" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="est-search" class="search-input-clean" placeholder="고객명 · 견적번호 검색" oninput="renderEstList()">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
      <span id="est-list-count" style="font-size:12px;color:#B0A99F"></span>
      <button onclick="exportEstimatesExcel()" style="height:30px;padding:0 12px;background:#282828;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        엑셀 다운로드
      </button>
    </div>
  </div>
  <div id="est-list-body"></div>
</div>
<div id="search" style="display:none" class="wrap">
  <div class="search-top">
    <div class="search-bar-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B0A99F" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="cust-search" class="search-input-clean" placeholder="고객명 · 연락처 · 주소 검색">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
      <label class="archived-check">
        <input type="checkbox" id="show-archived" onchange="renderSearch()">
        <span>보관 고객 포함</span>
      </label>
      <button onclick="exportExcel()" style="height:30px;padding:0 12px;background:#282828;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        엑셀 다운로드
      </button>
    </div>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-head-row">
        <span class="card-title">전체 고객</span>
        <span id="search-count" class="card-count"></span>
      </div>
    </div>
    <div id="search-list"></div>
  </div>
</div>
<div id="cal" style="display:none" class="wrap">
  <!-- 달력 카드 -->
  <!-- 캘린더 월 매출 요약바 -->
  <div id="cal-summary-bar" style="background:#fff;border-bottom:1px solid #EEE6DC;padding:10px 16px;display:flex;gap:0;margin-bottom:0"></div>
  <div class="card" style="padding:14px 14px 10px">
    <!-- 월 네비 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button id="cal-prev" style="background:none;border:none;font-size:18px;cursor:pointer;color:#282828;padding:2px 8px;line-height:1">‹</button>
      <div id="cal-month-label" style="font-size:15px;font-weight:700;color:#282828;letter-spacing:0.3px"></div>
      <button id="cal-next" style="background:none;border:none;font-size:18px;cursor:pointer;color:#282828;padding:2px 8px;line-height:1">›</button>
    </div>
    <!-- 요일 헤더 -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px">
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">일</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">월</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">화</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">수</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">목</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">금</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">토</div>
    </div>
    <!-- 날짜 그리드 -->
    <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px"></div>
  </div>
  <!-- 일정 목록 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-row">
        <span class="card-title" id="cal-list-label">6월 전체 일정</span>
      </div>
    </div>
    <div id="cal-list"></div>
  </div>
</div>
<div id="chart" style="display:none" class="wrap">
  <div class="chart-tab-bar">
    <button class="chart-tab on" data-period="daily">일</button>
    <button class="chart-tab" data-period="weekly">주</button>
    <button class="chart-tab" data-period="monthly">월</button>
    <button class="chart-tab" data-period="yearly">연</button>
  </div>
  <div class="card"><div class="sec" id="chart-period-label">오늘 매출</div><div id="chart-bars" style="display:flex;align-items:flex-end;gap:6px;height:120px;margin-bottom:8px"></div></div>
  <div class="card"><div class="sec" id="chart-summary-label">오늘 요약</div><div id="chart-summary" style="padding:0 16px"></div></div>
</div>
<div id="settings" style="display:none" class="wrap"></div>

<!-- 고객 상세 모달 -->
<div class="overlay" id="detail-overlay">
  <div class="modal-box">
    <div class="modal-top-bar"></div>
    <!-- 상단 헤더 -->
    <div style="padding:16px 16px 0;border-bottom:1px solid #EEE6DC">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div style="flex:1;min-width:0">
          <div style="font-size:20px;font-weight:900;color:#282828;letter-spacing:-0.5px;margin-bottom:6px" id="detail-name"></div>
          <div id="detail-summary-row" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"></div>
        </div>
        <button id="detail-close-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#B0A99F;flex-shrink:0;margin-left:8px;margin-top:2px">✕</button>
      </div>
      <!-- 핵심 정보 요약 바 -->
      <div id="detail-info-bar" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#EEE6DC;border-radius:8px;overflow:hidden;margin-bottom:0"></div>
      <!-- 탭 -->
      <div style="display:flex;border-top:1px solid #EEE6DC;margin-top:12px">
        <button id="dtab-info" onclick="switchDetailTab('info')" style="flex:1;padding:11px 0;font-size:13px;font-weight:700;font-family:inherit;border:none;background:none;cursor:pointer;border-bottom:2px solid #282828;color:#282828">고객 정보</button>
        <button id="dtab-est" onclick="switchDetailTab('est')" style="flex:1;padding:11px 0;font-size:13px;font-weight:600;font-family:inherit;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:#B0A99F">견적 이력 <span id="dtab-est-cnt" style="font-size:11px"></span></button>
      </div>
    </div>
    <div style="padding:16px" id="detail-body"></div>
    <div style="padding:16px;display:none" id="detail-est-body"></div>
  </div>
</div>

<!-- 고객 추가 모달 -->
<div class="overlay" id="add-overlay">
  <div class="modal-box">
    <!-- 헤더 -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 16px;background:#fff;border-radius:14px 14px 0 0;border-bottom:1px solid #EEE6DC">
      <div style="font-size:15px;font-weight:700;color:#282828" id="add-modal-title">고객 추가</div>
      <button id="add-close-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#B0A99F;line-height:1;padding:2px 4px">✕</button>
    </div>
    <!-- 폼 본문 -->
    <div style="padding:20px 20px 0">

      <!-- 안내 -->
      <div style="background:#FAF7F5;border:1px solid #EEE6DC;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#6B6B6B;line-height:1.6">
        네이버 예약 정보만 입력하세요<br>
        나머지 정보는 상담 후 고객 상세에서 추가할 수 있어요
      </div>

      <!-- 필수 정보 (3개만) -->
      <div style="background:#fff;border-radius:10px;padding:16px 16px 4px;margin-bottom:12px;border:1px solid #EEE6DC">
        <div style="font-size:11px;font-weight:700;color:#B0A99F;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px">예약 정보</div>
        <div class="form-row">
          <label class="form-label">고객명 <span class="form-required">*</span></label>
          <input class="form-input" id="add-name" placeholder="홍길동">
        </div>
        <div class="form-row">
          <label class="form-label">연락처 <span class="form-required">*</span></label>
          <input class="form-input" id="add-phone" placeholder="010-0000-0000" inputmode="numeric">
        </div>
        <div class="form-row">
          <label class="form-label">방문 예정일 <span class="form-required">*</span></label>
          <input class="form-input" type="date" id="add-date" style="padding:10px 8px;font-size:14px">
        </div>
      </div>

      <!-- 담당자 -->
      <div style="background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #EEE6DC">
        <div style="font-size:11px;font-weight:700;color:#B0A99F;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">담당자</div>
        <div id="staff-btn-wrap" style="display:flex;gap:8px"></div>

function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function fmt(n) { return (Number(n) || 0).toLocaleString() + '원'; }
function fmtMan(n) { return Math.round((Number(n)||0)/10000).toLocaleString() + '만원'; }
function todayStr() { var d = new Date(); return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()); }
function thisMonthStr() { var d = new Date(); return d.getFullYear() + '-' + pad2(d.getMonth()+1); }
function daysDiff(dateStr) { return Math.floor((new Date() - new Date(dateStr)) / 86400000); }
function fmtPhone(v) {
  var d = v.replace(/[^0-9]/g, '');
  if (d.slice(0,2) === '02') {
    if (d.length <= 6) return d.slice(0,2) + '-' + d.slice(2);
    if (d.length <= 9) return d.slice(0,2) + '-' + d.slice(2,5) + '-' + d.slice(5);
    return d.slice(0,2) + '-' + d.slice(2,6) + '-' + d.slice(6,10);
  }
  if (d.length <= 7) return d.slice(0,3) + '-' + d.slice(3);
  return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7,11);
}

function sbXHR(method, path, data, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open(method, SUPABASE_URL + '/rest/v1/' + path, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Prefer', method === 'POST' ? 'return=representation' : 'return=minimal');
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      var result = null;
      try { result = xhr.responseText ? JSON.parse(xhr.responseText) : []; } catch(e) { result = []; }
      callback(null, result);
    } else { callback({status: xhr.status, text: xhr.responseText}, null); }
  };
  xhr.onerror = function() { callback({status: 0, text: 'network error'}, null); };
  xhr.send(data ? JSON.stringify(data) : null);
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'style') e.style.cssText = attrs[k];
    else if (k === 'class') e.className = attrs[k];
    else if (k === 'text') e.textContent = attrs[k];
    else e.setAttribute(k, attrs[k]);
  });
  if (children) children.forEach(function(c) { if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}
function div(style, children) { return el('div', {style: style}, children); }

function updateHdKpi(allCustomers) {
  var now = new Date();
  var year = now.getFullYear();
  var month = thisMonthStr();
  var qtr = Math.floor(now.getMonth() / 3); // 0~3
  var isMaster = currentUser && currentUser.role === 'master';
  var targetC = isMaster ? allCustomers : allCustomers.filter(function(c){ return (c.staffName||'마스터')===(currentUser?currentUser.name:'마스터'); });

  // 이달
  var monthC = targetC.filter(function(c){ return (c.date||'').slice(0,7)===month; });
  var contracted = monthC.filter(function(c){ return c.stage!=='상담'; });
  var totalRev = contracted.reduce(function(s,c){ return s+(Number(c.price)||0); }, 0);

  // 연간
  var yearC = targetC.filter(function(c){ return (c.date||'').slice(0,4)===String(year) && c.stage!=='상담'; });
  var yearRev = yearC.reduce(function(s,c){ return s+(Number(c.price)||0); }, 0);

  // 분기
  var qtrMonths = [String(year)+'-'+pad2(qtr*3+1), String(year)+'-'+pad2(qtr*3+2), String(year)+'-'+pad2(qtr*3+3)];
  var qtrC = targetC.filter(function(c){ return qtrMonths.indexOf((c.date||'').slice(0,7))>=0 && c.stage!=='상담'; });
  var qtrRev = qtrC.reduce(function(s,c){ return s+(Number(c.price)||0); }, 0);

  // 목표
  var goal = parseInt(localStorage.getItem('dah_goal_마스터')||'50000000');
  var yearGoal = goal * 12;
  var qtrGoal  = goal * 3;

  // 목표 잔액 카피
  var copyEl = document.getElementById('kpi-goal-copy');
  if (copyEl) {
    var remain = goal - totalRev;
    var nowMonth = now.getMonth() + 1;
    if (remain > 0) {
      copyEl.innerHTML = nowMonth + '월, 목표까지 <span style="color:#F06E2D;font-weight:900">' + Math.round(remain/10000).toLocaleString() + '만원</span> 남았어요 💪';
    } else {
      copyEl.innerHTML = nowMonth + '월 목표 달성! <span style="color:#F06E2D;font-weight:900">+' + Math.round(Math.abs(remain)/10000).toLocaleString() + '만원</span> 초과 🎉';
    }
  }

  // 이달 KPI 카드
  var revEl = document.getElementById('hd-kpi-rev');
  var conEl = document.getElementById('hd-kpi-con');
  if (revEl) revEl.innerHTML = Math.round(totalRev/10000).toLocaleString() + '<span class="kpi-num-unit">만원</span>';
  var pct = goal > 0 ? Math.min(100, Math.round(totalRev/goal*100)) : 0;
  var barEl = document.getElementById('kpi-rev-bar');
  var pctEl = document.getElementById('kpi-rev-pct');
  var goalEl = document.getElementById('kpi-rev-goal');
  if (barEl) barEl.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (goalEl) goalEl.textContent = '목표 ' + Math.round(goal/10000).toLocaleString() + '만원';
  if (conEl) conEl.innerHTML = contracted.length + '<span>/'+monthC.length+'건</span>';

  // 연간 프로그레스
  var yearPct = yearGoal > 0 ? Math.min(100, Math.round(yearRev/yearGoal*100)) : 0;
  var yrEl = document.getElementById('kpi-year-rev');
  var yrBar = document.getElementById('kpi-year-bar');
  var yrPct = document.getElementById('kpi-year-pct');
  if (yrEl)  yrEl.textContent  = Math.round(yearRev/10000).toLocaleString() + '만';
  if (yrBar) yrBar.style.width = yearPct + '%';
  if (yrPct) yrPct.textContent = yearPct + '% 달성';

  // 분기 프로그레스
  var qPct = qtrGoal > 0 ? Math.min(100, Math.round(qtrRev/qtrGoal*100)) : 0;
  var qEl  = document.getElementById('kpi-qtr-rev');
  var qBar = document.getElementById('kpi-qtr-bar');
  var qPctEl = document.getElementById('kpi-qtr-pct');
  if (qEl)    qEl.textContent   = Math.round(qtrRev/10000).toLocaleString() + '만';
  if (qBar)   qBar.style.width  = qPct + '%';
  if (qPctEl) qPctEl.textContent = qPct + '% 달성';

  // 월간 프로그레스
  var mPct = goal > 0 ? Math.min(100, Math.round(totalRev/goal*100)) : 0;
  var mEl  = document.getElementById('kpi-mon-rev');
  var mBar = document.getElementById('kpi-mon-bar');
  var mPctEl = document.getElementById('kpi-mon-pct');
  if (mEl)    mEl.textContent   = Math.round(totalRev/10000).toLocaleString() + '만';
  if (mBar)   mBar.style.width  = mPct + '%';
  if (mPctEl) mPctEl.textContent = mPct + '% 달성';

  // 스테이지 칩
  var bar = document.getElementById('hd-stages-bar');
  if (!bar) return;
  bar.innerHTML = '';

      }).reduce(function(s,c){ return s+(Number(c.price)||0); }, 0);
      months12.push({key:mKey, label:(md.getMonth()+1)+'월', rev:mRev, isCurrent:mKey===month});
    }

    var maxRev12 = Math.max.apply(null, months12.map(function(m){ return m.rev; })) || 1;
    var svgNS = 'http://www.w3.org/2000/svg';
    var W=340, H=100, PAD=28, BPAD=20;
    var chartW = W-PAD*2, chartH = H-BPAD-8;
    var n = months12.length;

    var svg = document.createElementNS(svgNS,'svg');
    svg.setAttribute('width','100%'); svg.setAttribute('height',H+'px');
    svg.setAttribute('viewBox','0 0 '+W+' '+H);
    svg.style.display='block';

    // 가이드라인
    [0.5, 1].forEach(function(r){
      var y = H-BPAD-Math.round(r*chartH);
      var gl = document.createElementNS(svgNS,'line');
      gl.setAttribute('x1',PAD); gl.setAttribute('x2',W-PAD);
      gl.setAttribute('y1',y); gl.setAttribute('y2',y);
      gl.setAttribute('stroke','#EEE6DC'); gl.setAttribute('stroke-width','1');
      svg.appendChild(gl);
      var lt = document.createElementNS(svgNS,'text');
      lt.setAttribute('x',PAD-4); lt.setAttribute('y',y+3);
      lt.setAttribute('text-anchor','end'); lt.setAttribute('font-size','8');
      lt.setAttribute('fill','#B0A99F');
      lt.textContent = Math.round(maxRev12*r/10000)+'만';
      svg.appendChild(lt);
    });

    var pts12 = months12.map(function(m,i){
      var x = PAD + (i/(n-1))*chartW;
      var y = H-BPAD - Math.round(m.rev/maxRev12*chartH);
      return {x:x, y:y, rev:m.rev, label:m.label, isCurrent:m.isCurrent};
    });

    // 영역 채우기
    var areaD = 'M'+pts12[0].x.toFixed(1)+' '+pts12[0].y.toFixed(1);
    pts12.slice(1).forEach(function(p){ areaD += ' L'+p.x.toFixed(1)+' '+p.y.toFixed(1); });
    areaD += ' L'+pts12[pts12.length-1].x.toFixed(1)+' '+(H-BPAD)+' L'+pts12[0].x.toFixed(1)+' '+(H-BPAD)+' Z';
    var area12 = document.createElementNS(svgNS,'path');
    area12.setAttribute('d',areaD); area12.setAttribute('fill','rgba(240,110,45,0.06)');
    svg.appendChild(area12);

    // 꺾은선
    var pathD12 = 'M'+pts12[0].x.toFixed(1)+' '+pts12[0].y.toFixed(1);
    pts12.slice(1).forEach(function(p){ pathD12 += ' L'+p.x.toFixed(1)+' '+p.y.toFixed(1); });
    var path12 = document.createElementNS(svgNS,'path');
    path12.setAttribute('d',pathD12); path12.setAttribute('fill','none');
    path12.setAttribute('stroke','#F06E2D'); path12.setAttribute('stroke-width','2');
    path12.setAttribute('stroke-linejoin','round');
    svg.appendChild(path12);

    // 포인트 + 레이블
    pts12.forEach(function(p){
      var c12 = document.createElementNS(svgNS,'circle');
      c12.setAttribute('cx',p.x); c12.setAttribute('cy',p.y);
      c12.setAttribute('r',p.isCurrent?4:2.5);
      c12.setAttribute('fill',p.isCurrent?'#F06E2D':'#fff');
      c12.setAttribute('stroke','#F06E2D'); c12.setAttribute('stroke-width','1.5');
      svg.appendChild(c12);

      if (p.isCurrent && p.rev > 0) {
        var vt = document.createElementNS(svgNS,'text');
        vt.setAttribute('x',p.x); vt.setAttribute('y',p.y-7);
        vt.setAttribute('text-anchor','middle'); vt.setAttribute('font-size','10');
        vt.setAttribute('font-weight','700'); vt.setAttribute('fill','#F06E2D');
        vt.textContent = Math.round(p.rev/10000)+'만';
        svg.appendChild(vt);
      }

      // 3개월마다 레이블
      var idx12 = pts12.indexOf(p);
      if (idx12 % 3 === 0 || p.isCurrent) {
        var lt2 = document.createElementNS(svgNS,'text');
        lt2.setAttribute('x',p.x); lt2.setAttribute('y',H-4);
        lt2.setAttribute('text-anchor','middle'); lt2.setAttribute('font-size','9');
        lt2.setAttribute('fill',p.isCurrent?'#F06E2D':'#B0A99F');
        lt2.setAttribute('font-weight',p.isCurrent?'700':'400');
        lt2.textContent = p.label;
        svg.appendChild(lt2);
      }
    });

    var chartInner = el('div', {style:'padding:12px 8px 4px'});
    chartInner.appendChild(svg);
    chartCard.appendChild(chartInner);
    wrap.appendChild(chartCard);
  })();

  applyPermissions();
}

var calCurrentYear = new Date().getFullYear();
var calCurrentMonth = new Date().getMonth(); 
var calSelectedDate = null;

function getCalEvents(customers, year, month) {
  
  var monStr = year + '-' + pad2(month+1);
  var events = [];
  customers.forEach(function(c) {
    if ((c.date||'').slice(0,7) === monStr)
      events.push({date:c.date, name:c.clientName, space:c.space||'—', type:'상담', stage:c.stage, price:c.price||0, cust:c});
    if ((c.measureDate||'').slice(0,7) === monStr)
      events.push({date:c.measureDate, name:c.clientName, space:c.space||'—', type:'실측', stage:c.stage, price:c.price||0, cust:c});
    if ((c.installDate||'').slice(0,7) === monStr)
      events.push({date:c.installDate, name:c.clientName, space:c.space||'—', type:'시공', stage:c.stage, price:c.price||0, cust:c});
  });
  events.sort(function(a,b){ return a.date < b.date ? -1 : 1; });
  return events;
}

        '<div style="font-size:10px;color:#9A9490;letter-spacing:0.5px;margin-bottom:3px">' + item.label + '</div>' +
        '<div style="font-size:15px;font-weight:800;color:' + item.color + ';letter-spacing:-0.5px">' + item.value + '</div>' +
        '</div>';
    }).join('');
  }

  
  var lbl = document.getElementById('cal-month-label');
  if (lbl) lbl.textContent = yr + '년 ' + (mo+1) + '월';

  
  var events = getCalEvents(customers, yr, mo);
  // evMap: 날짜별 {types:[], items:[{type,name}]} 구조로 개선
  var evMap = {};
  events.forEach(function(ev) {
    if (!evMap[ev.date]) evMap[ev.date] = {types:[], items:[]};
    if (evMap[ev.date].types.indexOf(ev.type) < 0) evMap[ev.date].types.push(ev.type);
    evMap[ev.date].items.push({type:ev.type, name:ev.name, price:ev.price||0});
  });

  
  var grid = document.getElementById('cal-grid');
  if (!grid) return;
  grid.innerHTML = '';

  var firstDay = new Date(yr, mo, 1).getDay(); 
  var daysInMonth = new Date(yr, mo+1, 0).getDate();
  var daysInPrev = new Date(yr, mo, 0).getDate();
  var totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  // 이벤트 타입 색상
  var TYPE_DOT_COLOR = {상담:'#5C7A9F', 실측:'#8B6BB1', 시공:'#F06E2D'};
  var TYPE_TEXT_COLOR = {상담:'#5C7A9F', 실측:'#8B6BB1', 시공:'#F06E2D'};

  for (var i = 0; i < totalCells; i++) {
    var cell = document.createElement('div');
    cell.className = 'cal-day-cell';
    var dayNum, dateStr, isOther = false;
    if (i < firstDay) {
      dayNum = daysInPrev - firstDay + i + 1;
      isOther = true;
      dateStr = yr + '-' + pad2(mo === 0 ? 12 : mo) + '-' + pad2(dayNum);
    } else if (i >= firstDay + daysInMonth) {
      dayNum = i - firstDay - daysInMonth + 1;
      isOther = true;
      dateStr = yr + '-' + pad2(mo === 11 ? 1 : mo+2) + '-' + pad2(dayNum);
    } else {
      dayNum = i - firstDay + 1;
      dateStr = yr + '-' + pad2(mo+1) + '-' + pad2(dayNum);
    }
    if (isOther) cell.classList.add('other-month');
    if (dateStr === today && !isOther) cell.classList.add('today');
    if (dateStr === calSelectedDate) cell.classList.add('selected');

    var numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = dayNum;
    cell.appendChild(numEl);

    // 이벤트 표시 - 텍스트 레이블로 개선
    if (!isOther && evMap[dateStr]) {
      var evData = evMap[dateStr];
      evData.items.slice(0,2).forEach(function(item) {
        var evLabel = document.createElement('div');
        evLabel.style.cssText =
          'width:100%;font-size:9px;font-weight:700;line-height:1.3;' +
          'padding:1px 3px;border-radius:3px;margin-top:1px;' +
          'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;' +
          'background:' + (TYPE_DOT_COLOR[item.type]||'#282828') + '22;' +
          'color:' + (TYPE_TEXT_COLOR[item.type]||'#282828');
        evLabel.textContent = item.type[0] + ' ' + item.name;
        cell.appendChild(evLabel);
      });
      // 3건 이상이면 +N 표시
      if (evData.items.length > 2) {
        var moreEl = document.createElement('div');
        moreEl.style.cssText = 'font-size:9px;color:#9A9490;margin-top:1px;text-align:center';
        moreEl.textContent = '+' + (evData.items.length - 2);
        cell.appendChild(moreEl);
      }
    }

    (function(ds, isOth) {
      cell.addEventListener('click', function() {
        if (isOth) return;
        calSelectedDate = ds;
        renderCal();
        renderCalList(customers, ds);
      });
    })(dateStr, isOther);

    grid.appendChild(cell);
  }

  
  if (calSelectedDate) {
    renderCalList(customers, calSelectedDate);
  } else {
    renderCalList(customers, null); 
  }
}

      getCalEvents(customers, yr, 2), getCalEvents(customers, yr, 3), getCalEvents(customers, yr, 4),

var currentChartPeriod = 'daily';

function renderChart(period) {
  if (period) currentChartPeriod = period;
  var allChart = loadCustomers();
  var customers = (currentUser && currentUser.role === 'staff') ? allChart.filter(function(c) { return (c.staffName||'마스터') === currentUser.name; }) : allChart;
  var now = new Date();
  var barsEl = document.getElementById('chart-bars'); barsEl.innerHTML = '';
  barsEl.style.padding = '4px 16px 0';
  barsEl.style.boxSizing = 'border-box';
  if(periodLabel) periodLabel.style.padding = '12px 16px 8px';
  var sumEl = document.getElementById('chart-summary'); sumEl.innerHTML = '';
  sumEl.style.padding = '0 4px';
  var periodLabel = document.getElementById('chart-period-label');
  var summaryLabel = document.getElementById('chart-summary-label');

  
  document.querySelectorAll('.chart-tab').forEach(function(b) {
    var isOn = b.getAttribute('data-period') === currentChartPeriod;
    b.classList.toggle('on', isOn);
    b.style.color = '';
    b.style.borderBottom = '';
    b.style.fontWeight = '';
  });

  var periods = [], currentKey = '', labels = [];

  if (currentChartPeriod === 'daily') {
    
    periodLabel.textContent = '일별 매출 (최근 7일)';
    summaryLabel.textContent = '오늘 요약';
    for (var i = 6; i >= 0; i--) {
      var d = new Date(now); d.setDate(d.getDate() - i);
      var key = d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
      periods.push({key: key, label: (d.getMonth()+1)+'/'+d.getDate()});
    }
    currentKey = todayStr();
  } else if (currentChartPeriod === 'weekly') {
    
    periodLabel.textContent = '주별 매출 (최근 6주)';
    summaryLabel.textContent = '이번 주 요약';
    for (var i = 5; i >= 0; i--) {
      var d = new Date(now); d.setDate(d.getDate() - (i * 7));
      var weekStart = new Date(d); weekStart.setDate(d.getDate() - d.getDay());
      var weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
      var key = weekStart.getFullYear()+'-'+pad2(weekStart.getMonth()+1)+'-'+pad2(weekStart.getDate());
      periods.push({key: key, endKey: weekEnd.getFullYear()+'-'+pad2(weekEnd.getMonth()+1)+'-'+pad2(weekEnd.getDate()), label: (weekStart.getMonth()+1)+'/'+weekStart.getDate()});
    }
    var thisWeekStart = new Date(now); thisWeekStart.setDate(now.getDate() - now.getDay());
    currentKey = thisWeekStart.getFullYear()+'-'+pad2(thisWeekStart.getMonth()+1)+'-'+pad2(thisWeekStart.getDate());
  } else if (currentChartPeriod === 'monthly') {
    
    periodLabel.textContent = '월별 매출 (최근 6개월)';
    summaryLabel.textContent = '이번 달 요약';
    for (var i = 5; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      periods.push({key: d.getFullYear()+'-'+pad2(d.getMonth()+1), label:(d.getMonth()+1)+'월'});
    }
    currentKey = thisMonthStr();
  } else if (currentChartPeriod === 'yearly') {
    
    periodLabel.textContent = '연별 매출 (최근 3년)';
    summaryLabel.textContent = '올해 요약';
    for (var i = 2; i >= 0; i--) {
      var y = now.getFullYear() - i;
      periods.push({key: String(y), label: y+'년'});
    }
    currentKey = String(now.getFullYear());
  }

  
  var revenues = periods.map(function(p) {
    return customers.filter(function(c) {
      var cDate = c.date || (c.createdAt||'').slice(0,10);
      if (!cDate) return false;
      if (c.stage === '상담' || !c.price || c.price <= 0) return false;
      var useDate = cDate;
      if (currentChartPeriod === 'daily') return useDate === p.key;
      if (currentChartPeriod === 'weekly') return useDate >= p.key && useDate <= p.endKey;
      if (currentChartPeriod === 'monthly') return useDate.slice(0,7) === p.key;
      if (currentChartPeriod === 'yearly') return useDate.slice(0,4) === p.key;
    }).reduce(function(s,c) { return s+(Number(c.price)||0); }, 0);
  });

  var maxRev = Math.max.apply(null, revenues) || 1;
  var W = barsEl.clientWidth || 340, H = 120, PAD = 16;
  var chartW = W - PAD*2, chartH = H - 28;
  var n = periods.length;
  
  var pts = periods.map(function(p,i){
    var x = PAD + (i/(n-1||1))*chartW;
    var y = H - 28 - Math.round(revenues[i]/maxRev*chartH);
    return {x:x, y:y, rev:revenues[i], label:p.label, isCurrent:p.key===currentKey};
  });
  var pathD = pts.map(function(p,i){ return (i===0?'M':'L')+p.x.toFixed(1)+' '+p.y.toFixed(1); }).join(' ');
  var areaD = pathD+' L'+pts[pts.length-1].x.toFixed(1)+' '+(H-28)+' L'+pts[0].x.toFixed(1)+' '+(H-28)+' Z';
  var svgNS = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(svgNS,'svg');
  svg.setAttribute('width','100%'); svg.setAttribute('height',H+'px');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  
  [0.25,0.5,0.75,1].forEach(function(r){
    var y = H-28-Math.round(r*chartH);
    var line = document.createElementNS(svgNS,'line');
    line.setAttribute('x1',PAD); line.setAttribute('x2',W-PAD);
    line.setAttribute('y1',y); line.setAttribute('y2',y);
    line.setAttribute('stroke','#EEE6DC'); line.setAttribute('stroke-width','1');
    svg.appendChild(line);
    var lbl = document.createElementNS(svgNS,'text');
    lbl.setAttribute('x',PAD-4); lbl.setAttribute('y',y+4);
    lbl.setAttribute('text-anchor','end'); lbl.setAttribute('font-size','9');
    lbl.setAttribute('fill','#B0A99F');
    lbl.textContent = Math.round(maxRev*r/10000)+'만';
    svg.appendChild(lbl);
  });
  
  var area = document.createElementNS(svgNS,'path');
  area.setAttribute('d',areaD);
  area.setAttribute('fill','rgba(40,40,40,0.06)');
  svg.appendChild(area);
  
  var path = document.createElementNS(svgNS,'path');
  path.setAttribute('d',pathD);
  path.setAttribute('fill','none'); path.setAttribute('stroke','#282828');
  path.setAttribute('stroke-width','2'); path.setAttribute('stroke-linejoin','round');
  svg.appendChild(path);
  
  pts.forEach(function(p){
    var circle = document.createElementNS(svgNS,'circle');
    circle.setAttribute('cx',p.x); circle.setAttribute('cy',p.y);
    circle.setAttribute('r', p.isCurrent?5:3);
    circle.setAttribute('fill', p.isCurrent?'#282828':'#fff');
    circle.setAttribute('stroke','#282828'); circle.setAttribute('stroke-width','2');
    svg.appendChild(circle);
    
    if(p.isCurrent && p.rev>0){
      var val = document.createElementNS(svgNS,'text');
      val.setAttribute('x',p.x); val.setAttribute('y',p.y-10);
      val.setAttribute('text-anchor','middle'); val.setAttribute('font-size','11');
      val.setAttribute('font-weight','700'); val.setAttribute('fill','#282828');
      val.textContent = Math.round(p.rev/10000)+'만';
      svg.appendChild(val);
    }
    
    var lbl2 = document.createElementNS(svgNS,'text');
    lbl2.setAttribute('x',p.x); lbl2.setAttribute('y',H-8);
    lbl2.setAttribute('text-anchor','middle'); lbl2.setAttribute('font-size','10');
    lbl2.setAttribute('fill', p.isCurrent?'#282828':'#B0A99F');
    lbl2.setAttribute('font-weight', p.isCurrent?'700':'400');
    lbl2.textContent = p.label;
    svg.appendChild(lbl2);
  });
  barsEl.appendChild(svg);

  
  var currentCustomers = customers.filter(function(c) {
    if (!c.date) return false;
    var _cd = c.date || (c.createdAt||'').slice(0,10);
    if (currentChartPeriod === 'daily') return _cd === currentKey;
    if (currentChartPeriod === 'weekly') { var p = periods[periods.length-1]; return _cd >= p.key && _cd <= p.endKey; }
    if (currentChartPeriod === 'monthly') return _cd.slice(0,7) === currentKey;
    if (currentChartPeriod === 'yearly') return _cd.slice(0,4) === currentKey;
  });
  var curRev = currentCustomers.filter(function(c){return c.stage!=='상담';}).reduce(function(s,c){return s+(Number(c.price)||0);},0);
  var curPerf = currentCustomers.filter(function(c){return c.stage!=='상담';}).reduce(function(s,c){return s+(Number(c.performanceRevenue)||0);},0);
  var curCon = currentCustomers.filter(function(c){return c.stage!=='상담';}).length;
  var curCons = currentCustomers.length;
  var conv = curCons > 0 ? Math.round(curCon/curCons*100) : 0;

  [['전체 매출',fmt(curRev),'#282828'],['성과매출',fmt(curPerf),'#282828'],['상담 건수',curCons+'건','#282828'],['계약 건수',curCon+'건','#282828'],['전환율',conv+'%','#282828']].forEach(function(row) {
    sumEl.appendChild(div('display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #EEE6DC', [span('font-size:14px;color:#282828', row[0]), span('font-size:14px;font-weight:700;color:'+row[2], row[1])]));
  });
}

function exportExcel() {
  try {
    var customers = loadCustomers();
    if (!customers || customers.length === 0) { showToast('내보낼 고객 데이터가 없습니다'); return; }

    var headers = ['고객명','연락처','주소','공간','단계','금액','성과매출','담당자','계약일','실측일','시공일','방문횟수','메모'];

    var rows = customers.map(function(c) {
      return [
        c.clientName   || '',
        c.phone        || '',
        c.addr         || '',
        c.space        || '',
        c.stage        || '',
        c.price        || 0,
        c.performanceRevenue || 0,
        c.staffName    || '마스터',
        c.date         || '',
        c.measureDate  || '',
        c.installDate  || '',
        c.visitCount   || 1,
        c.memo         || ''
      ];
    });

    var BOM = '\uFEFF';
    var csv = BOM + [headers].concat(rows).map(function(row) {
      return row.map(function(cell) {
        var s = String(cell);
        if (s.indexOf(',') >= 0 || s.indexOf('\n') >= 0 || s.indexOf('"') >= 0) {
          s = '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      }).join(',');
    }).join('\r\n');

    var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    var d    = new Date();
    a.href     = url;
    a.download = '드로잉엣홈_고객목록_' + d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate()) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('엑셀 파일 저장 완료 (' + customers.length + '건)');
  } catch(e) {
    alert('내보내기 실패: ' + e.message);
  }
}

  }));

  wrap.appendChild(staffCard);

  
  var goalCard = div('background:#fff;margin-bottom:10px;padding:16px', [
    span('font-size:12px;font-weight:700;color:#B0A99F;letter-spacing:1.2px;display:block;margin-bottom:12px', '🎯 담당자별 월 목표 매출')
  ]);
  var allStaffs = ['마스터'].concat(getStaffList());
  allStaffs.forEach(function(staff) {

      span('font-size:13px;font-weight:700;display:block;margin-bottom:4px', staff)
    ]);
    var gInput = el('input', {type:'number', placeholder:'목표 금액 (원)', value:curGoal>0?String(curGoal):'', style:'width:100%;padding:9px 10px;border:1px solid #EEE6DC;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box'});
    (function(k, s) {
      gInput.addEventListener('change', function() {
        var v = Number(this.value.replace(/[^0-9]/g,''));
        if(v>0) { localStorage.setItem(k, String(v)); showToast(s+' 목표 설정됐습니다'); }
      });
    })(goalKey, staff);
    gRow.appendChild(gInput);
    goalCard.appendChild(gRow);
  });
  wrap.appendChild(goalCard);

  
  var webhookCard = div('background:#fff;margin-bottom:10px;padding:16px', [
    span('font-size:12px;font-weight:700;color:#B0A99F;letter-spacing:1.2px;display:block;margin-bottom:4px', '⚙️ Make.com 웹훅 URL'),
    span('font-size:12px;color:#B0A99F;display:block;margin-bottom:10px', '알림톡 자동 발송 연동 (검수 완료 후 입력)')
  ]);
  var curWebhook = localStorage.getItem('dah_webhook_url') || '';
  var webhookInput = el('input', {type:'text', placeholder:'https://hook.make.com/...', value:curWebhook, style:'width:100%;padding:9px 10px;border:1px solid #EEE6DC;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:8px'});
  webhookCard.appendChild(webhookInput);
  webhookCard.appendChild(btn('width:100%;padding:10px;background:#282828;color:#fff;border:none;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer', '저장', function() {
    var url = webhookInput.value.trim();
    try { localStorage.setItem('dah_webhook_url', url); } catch(e){}
    showToast('웹훅 URL이 저장됐습니다');
  }));
  wrap.appendChild(webhookCard);

  
  var dataCard = div('background:#fff;margin-bottom:10px;padding:16px', [
    span('font-size:12px;font-weight:700;color:#B0A99F;letter-spacing:1.2px;display:block;margin-bottom:12px', '💾 데이터 관리')
  ]);
  dataCard.appendChild(btn('width:100%;padding:11px;background:#282828;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:8px', '📊 고객목록 엑셀 내보내기', exportExcel));
  dataCard.appendChild(btn('width:100%;padding:11px;background:#5C7A9F;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:8px', '📋 견적서목록 엑셀 내보내기', exportEstimatesExcel));
  dataCard.appendChild(btn('width:100%;padding:11px;background:#fff;border:1px solid #EEE6DC;font-size:14px;font-family:inherit;cursor:pointer;margin-bottom:8px', '💾 백업 (JSON 다운로드)', backupData));
  var restoreInput = el('input', {type:'file', accept:'.json', style:'display:none', id:'restore-input'});
  restoreInput.addEventListener('change', function(e) {
    var file = e.target.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if(data.customers) {
          saveCustomers(data.customers);
          showToast('복원 완료! ' + data.customers.length + '건');
          renderHome();
        }
      } catch(err) { alert('파일 형식이 올바르지 않습니다'); }
    };
    reader.readAsText(file);
  });
  dataCard.appendChild(restoreInput);
  dataCard.appendChild(btn('width:100%;padding:11px;background:#fff;border:1px solid #EEE6DC;font-size:14px;font-family:inherit;cursor:pointer', '📂 복원 (JSON 업로드)', function() { document.getElementById('restore-input').click(); }));
  wrap.appendChild(dataCard);
}

function loadEstimates(customerName, callback) {
  sbXHR('GET', 'estimates?customer_name=eq.' + encodeURIComponent(customerName) + '&order=created_at.desc', null, function(err, data) {
    if (err) { callback([]); return; }
    callback(data || []);
  });
}

var CONTRACT_LABELS = {pending:'가견적', contracted:'✅ 계약됨', rejected:'미계약'};
var CONTRACT_COLORS = {pending:'#6B6B6B', contracted:'#282828', rejected:'#B0A99F'};
var STATUS_LABELS = {ga:'가견적서', final:'최종견적서'};

function renderEstimateHistory(container, clientName) {
  var estSec = el('div', {style:'margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #EEE6DC'});
  var hd = el('div', {style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:10px'});
  var lbl = el('div', {style:'font-size:12px;font-weight:700;color:#B0A99F;letter-spacing:1px;text-transform:uppercase', text:'견적서'});
  hd.appendChild(lbl);
  estSec.appendChild(hd);

  var estimates = [];
  try {
    var all = JSON.parse(localStorage.getItem('dah_saved')||'[]');
    estimates = all.filter(function(e){ return e.clientName === clientName; });
  } catch(ex) {}

  if (estimates.length === 0) {
    var emptyEl = el('div', {style:'font-size:13px;color:#B0A99F;padding:10px 0;text-align:center', text:'저장된 견적서 없음'});
    estSec.appendChild(emptyEl);
    container.appendChild(estSec);
    return;
  }

  estimates.forEach(function(e, ei) {
    var cs = e.contractStatus || 'pending';
    var isLast = ei === estimates.length - 1;
    var card = el('div', {style:
      'border:1px solid #EEE6DC;border-radius:8px;padding:12px 14px;' +
      'margin-bottom:' + (isLast?'0':'8px') + ';background:#fff'
    });

    
    var top = el('div', {style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px'});
    var noEl = el('div', {style:'display:flex;align-items:center;gap:6px'});
    var noSpan = el('span', {style:'font-size:12px;font-weight:700;color:#282828', text:e.no||'—'});
    var typeSpan = el('span', {style:
      'font-size:11px;color:#6B6B6B;border:1px solid #EEE6DC;' +
      'padding:1px 6px;border-radius:3px',
      text: STATUS_LABELS[e.status]||'가견적서'
    });
    noEl.appendChild(noSpan); noEl.appendChild(typeSpan);

    
    var contractBadge = el('button', {style:
      'font-size:11px;font-weight:700;border:none;cursor:pointer;' +
      'padding:3px 10px;border-radius:4px;font-family:inherit;' +
      'background:' + (cs==='contracted'?'#282828':'#FAF7F5') + ';' +
      'color:' + (cs==='contracted'?'#fff':'#6B6B6B'),
      text: CONTRACT_LABELS[cs]||'가견적'
    });
    var csArr = ['pending','contracted','rejected'];
    (function(entry, badge){
      badge.addEventListener('click', function(ev){
        ev.stopPropagation();
        var cur = entry.contractStatus || 'pending';
        var next = csArr[(csArr.indexOf(cur)+1)%csArr.length];
        entry.contractStatus = next;
        
        try {
          var arr = JSON.parse(localStorage.getItem('dah_saved')||'[]');
          var idx = arr.findIndex(function(x){ return x.id === entry.id || x.no === entry.no; });
          if (idx>=0) { arr[idx].contractStatus = next; localStorage.setItem('dah_saved', JSON.stringify(arr)); }
        } catch(ex2){}
        badge.textContent = CONTRACT_LABELS[next];
        badge.style.background = next==='contracted'?'#282828':'#FAF7F5';
        badge.style.color = next==='contracted'?'#fff':'#6B6B6B';
      });
    })(e, contractBadge);

    top.appendChild(noEl); top.appendChild(contractBadge);
    card.appendChild(top);

    
    var mid = el('div', {style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px'});
    var spaceEl = el('span', {style:'font-size:13px;color:#282828', text:e.space||'—'});
    var priceEl = el('span', {style:'font-size:14px;font-weight:700;color:#282828', text:(Number(e.price)||0).toLocaleString()+'원'});
    mid.appendChild(spaceEl); mid.appendChild(priceEl);
    card.appendChild(mid);

    
    if (e.fabric) {
      var fabEl = el('div', {style:'font-size:12px;color:#B0A99F;margin-bottom:4px', text:'원단: ' + e.fabric});
      card.appendChild(fabEl);
    }

    
    var bot = el('div', {style:'font-size:11px;color:#B0A99F'});
    var dateStr = e.savedAt ? e.savedAt.slice(0,10) : (e.date||'');
    bot.textContent = dateStr + (e.staffName ? ' · ' + e.staffName : '');
    card.appendChild(bot);

    estSec.appendChild(card);
  });

  container.appendChild(estSec);
}

function showEstimateHistory(customerName) {
  loadEstimates(customerName, function(estimates) {
    var body = document.getElementById('detail-body');
    var histSection = document.getElementById('estimate-history-section');
    if (histSection) histSection.remove();

    var section = el('div', {id:'estimate-history-section', style:'margin-top:14px'});
    section.appendChild(span('font-size:12px;color:#B0A99F;letter-spacing:1.2px;display:block;margin-bottom:8px', '📋 시공 이력 (' + estimates.length + '건)'));

    if (estimates.length === 0) {
      section.appendChild(span('font-size:14px;color:#B0A99F;display:block;text-align:center;padding:12px 0', '시공 이력이 없습니다'));
    } else {
      estimates.forEach(function(e) {
        var row = div('padding:10px;border:1px solid #EEE6DC;margin-bottom:6px;background:#FAF7F5', [
          div('display:flex;justify-content:space-between;margin-bottom:4px', [
            span('font-size:13px;font-weight:700', e.space || '—'),
            span('font-size:13px;color:#282828;font-weight:700', (Number(e.price)||0).toLocaleString()+'원')
          ]),
          e.product ? span('font-size:12px;color:#282828;display:block', '제품: ' + e.product) : null,
          e.fabric ? span('font-size:12px;color:#282828;display:block', '원단: ' + e.fabric) : null,
          (e.width && e.height) ? span('font-size:12px;color:#282828;display:block', '사이즈: ' + e.width + ' × ' + e.height + 'cm') : null,
          span('font-size:11px;color:#B0A99F;display:block;margin-top:4px', (e.date||'') + ' · ' + (e.stage||'') + ' · ' + (e.staff_name||''))
        ]);
        section.appendChild(row);
      });
    }
    body.appendChild(section);
  });
}

document.addEventListener('click', function(e) {
  if (e.target.id === 'cal-prev') {
    calCurrentMonth--;
    if (calCurrentMonth < 0) { calCurrentMonth = 11; calCurrentYear--; }
    calSelectedDate = null;
    var allCal2 = loadCustomers();
    var cust2 = (currentUser && currentUser.role === 'staff') ? allCal2.filter(function(c){ return (c.staffName||'마스터')===currentUser.name; }) : allCal2;
    renderCal();
  }
  if (e.target.id === 'cal-next') {
    calCurrentMonth++;
    if (calCurrentMonth > 11) { calCurrentMonth = 0; calCurrentYear++; }
    calSelectedDate = null;
    renderCal();
  }
});

(function() {
  try {
    var _rawSess = JSON.parse(localStorage.getItem('dah_session') || 'null');
    if (_rawSess && _rawSess.loginAt && (Date.now()-_rawSess.loginAt) > 8*60*60*1000) {
      localStorage.removeItem('dah_session'); _rawSess = null;
    }
    var saved = _rawSess;
    if (saved && saved.name && saved.role) {
      var validStaffs = ['마스터'].concat(getStaffList());
      if (validStaffs.indexOf(saved.name) >= 0) {
        currentUser = saved;
        var loginScreen = document.getElementById('login-screen'); if (loginScreen) loginScreen.style.display = 'none';
        var badge = document.getElementById('current-user-badge'); if (badge) badge.textContent = currentUser.name;
        applyPermissions(); loadCustomersAsync(renderHome); return;
      }
    }
  } catch(e) {}
  renderStaffLoginList();
})();
