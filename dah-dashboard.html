<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>드로잉엣홈 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#F7F4F0;color:#1A1A1A;padding-bottom:80px}
.hd{background:#fff;border-bottom:1px solid #E5E0D8;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;max-width:640px;margin:0 auto}
.tabs{display:flex;max-width:640px;margin:0 auto;background:#fff;border-bottom:1px solid #E5E0D8;position:sticky;top:47px;z-index:98}
.tab{flex:1;padding:11px 0;font-size:10px;font-weight:700;text-align:center;cursor:pointer;color:#A8A8A8;border:none;background:transparent;letter-spacing:0.3px}
.tab.on{color:#D4622A;border-bottom:2px solid #D4622A;margin-bottom:-1px}
.wrap{max-width:640px;margin:0 auto;padding:14px;padding-bottom:40px}
.card{background:#fff;margin-bottom:10px;padding:14px 16px}
.sec{font-size:11px;font-weight:700;color:#A8A8A8;letter-spacing:1.2px;margin-bottom:10px}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #E5E0D8;font-size:13px;cursor:pointer}
.row:last-child{border:none}
.badge{padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:#6B6B6B;font-weight:700;margin-bottom:4px}
.form-input{width:100%;padding:10px 12px;border:1px solid #E5E0D8;font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none}
.form-input:focus{border-color:#D4622A}
select.form-input{background:#fff}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200}
.overlay.open{display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;width:100%;max-width:640px;max-height:85vh;overflow-y:auto}
input[type=search],input[type=text]{width:100%;padding:11px 14px;border:1px solid #E5E0D8;font-size:13px;font-family:inherit;outline:none;background:#fff;-webkit-appearance:none}
input:focus{border-color:#D4622A}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 20px;font-size:12px;font-family:inherit;z-index:999;white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none}
.login-screen{position:fixed;inset:0;background:#F7F4F0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:400px;background:#fff;padding:28px 24px}
.login-title{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center}
.login-sub{font-size:12px;color:#A8A8A8;text-align:center;margin-bottom:24px}
.user-btn{width:100%;padding:14px;border:1px solid #E5E0D8;background:#fff;font-size:14px;font-family:inherit;cursor:pointer;margin-bottom:8px;text-align:left;display:flex;align-items:center;gap:10px}
.user-btn:hover{border-color:#1A1A1A;background:#F7F4F0}
.user-btn.master{border-color:#D4622A}
.alim-btn{padding:10px;border:1px solid #E5E0D8;background:#fff;cursor:pointer;text-align:center;transition:all 0.15s}
.alim-btn:hover{background:#F7F4F0}
.alim-btn .alim-label{font-size:12px;font-weight:700;display:block;margin-bottom:2px}
.alim-btn .alim-desc{font-size:10px;color:#A8A8A8}
</style>
</head>
<body>

<script>
var STAGES = ['상담','계약금','실측','잔금','시공','완료'];
var STAGE_COLORS = {상담:'#D4622A',계약금:'#16a34a',실측:'#0ea5e9',잔금:'#b45309',시공:'#1A1A1A',완료:'#A8A8A8'};
var STAGE_BG = {상담:'#fff7f4',계약금:'#f0fdf4',실측:'#f0f9ff',잔금:'#fffbeb',시공:'#f5f5f5',완료:'#f9f9f9'};
var currentDetailName = null;

var MASTER_PW = (function(){ try{ return localStorage.getItem('dah_master_pw')||'dah2012'; }catch(e){ return 'dah2012'; } })();
var currentUser = null;

function getStaffList() {
  try { var list = JSON.parse(localStorage.getItem('dah_staff_list') || '[]'); return list.length > 0 ? list : []; } catch(e) { return []; }
}

function loginAs(who) {
  if (who === 'master') { currentUser = {name:'마스터', role:'master'}; }
  else { currentUser = {name:who, role:'staff'}; }
  try { localStorage.setItem('dah_session', JSON.stringify(currentUser)); } catch(e){}
  var loginScreen = document.getElementById('login-screen');
  if (loginScreen) loginScreen.style.display = 'none';
  var badge = document.getElementById('current-user-badge');
  if (badge) badge.textContent = currentUser.name;
  applyPermissions();
  loadCustomersAsync(renderHome);
}

function applyPermissions() {
  var isMaster = currentUser && currentUser.role === 'master';
  var backupBtn = document.getElementById('btn-backup');
  if (backupBtn) backupBtn.style.display = isMaster ? '' : 'none';
}

function logout() {
  currentUser = null;
  try { localStorage.removeItem('dah_session'); } catch(e){}
  var ls = document.getElementById('login-screen');
  if(ls) ls.style.display = 'flex';
  var pw = document.getElementById('master-pw-wrap');
  if(pw) pw.style.display = 'none';
  renderStaffLoginList();
}

function changeMasterPassword() {
  var cur = document.getElementById('change-pw-current');
  var nw = document.getElementById('change-pw-new');
  var con = document.getElementById('change-pw-confirm');
  if(!cur||!nw||!con) return;
  if(cur.value !== MASTER_PW) { alert('현재 비밀번호가 틀렸습니다.'); cur.value=''; return; }
  if(nw.value.length < 4) { alert('새 비밀번호는 4자 이상이어야 합니다.'); return; }
  if(nw.value !== con.value) { alert('새 비밀번호가 일치하지 않습니다.'); con.value=''; return; }
  MASTER_PW = nw.value;
  try { localStorage.setItem('dah_master_pw', MASTER_PW); } catch(e){}
  cur.value=''; nw.value=''; con.value='';
  showToast('비밀번호가 변경됐습니다');
  var wrap = document.getElementById('pw-change-wrap');
  if(wrap) wrap.style.display = 'none';
}

function renderStaffLoginList() {
  var list = getStaffList();
  var el2 = document.getElementById('staff-login-list');
  if (!el2) return;
  el2.innerHTML = '';
  list.forEach(function(name) {
    var b = document.createElement('button');
    b.className = 'user-btn';
    b.innerHTML = '<span style="font-size:18px">👤</span><div><div style="font-weight:700;font-size:14px">'+name+'</div><div style="font-size:11px;color:#A8A8A8">본인 실적만 보기</div></div>';
    b.addEventListener('click', function() { loginAs(name); });
    el2.appendChild(b);
  });
}

function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function fmt(n) { return (Number(n) || 0).toLocaleString() + '원'; }
function todayStr() { var d = new Date(); return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()); }
function thisMonthStr() { var d = new Date(); return d.getFullYear() + '-' + pad2(d.getMonth()+1); }
function daysDiff(dateStr) { return Math.floor((new Date() - new Date(dateStr)) / 86400000); }
function fmtPhone(v) {
  var d = v.replace(/[^0-9]/g, '');
  if (d.slice(0,2) === '02') {
    if (d.length <= 6) return d.slice(0,2) + '-' + d.slice(2);
    if (d.length <= 9) return d.slice(0,2) + '-' + d.slice(2,5) + '-' + d.slice(5);
    return d.slice(0,2) + '-' + d.slice(2,6) + '-' + d.slice(6,10);
  }
  if (d.length <= 7) return d.slice(0,3) + '-' + d.slice(3);
  return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7,11);
}

function sbXHR(method, path, data, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open(method, SUPABASE_URL + '/rest/v1/' + path, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Prefer', method === 'POST' ? 'return=representation' : 'return=minimal');
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      var result = null;
      try { result = xhr.responseText ? JSON.parse(xhr.responseText) : []; } catch(e) { result = []; }
      callback(null, result);
    } else { callback({status: xhr.status, text: xhr.responseText}, null); }
  };
  xhr.onerror = function() { callback({status: 0, text: 'network error'}, null); };
  xhr.send(data ? JSON.stringify(data) : null);
}

function loadCustomers() {
  if (_customerCache.length > 0) return _customerCache;
  try { return JSON.parse(localStorage.getItem('dah_customers') || '[]'); } catch(e) { return []; }
}

function loadCustomersAsync(callback) {
  sbXHR('GET', 'customers?select=*&order=created_at.desc', null, function(err, data) {
    if (err) { try { _customerCache = JSON.parse(localStorage.getItem('dah_customers') || '[]'); } catch(e) {} }
    else { _customerCache = (data || []).map(dbRowToCustomer); try { localStorage.setItem('dah_customers', JSON.stringify(_customerCache)); } catch(e) {} }
    if (callback) callback();
  });
}

function saveCustomers(arr) { _customerCache = arr; try { localStorage.setItem('dah_customers', JSON.stringify(arr)); } catch(e) {} }

function saveCustomerToDb(customer, callback) {
  var row = customerToDbRow(customer);
  if (customer.id) {
    sbXHR('PATCH', 'customers?id=eq.' + customer.id, row, function(err, data) { if(err) console.error('수정 오류:', err.text); if(callback) callback(err, data); });

}

var currentChartPeriod = 'daily';

function renderChart(period) {
  if (period) currentChartPeriod = period;
  var allChart = loadCustomers();
  var customers = (currentUser && currentUser.role === 'staff') ? allChart.filter(function(c) { return (c.staffName||'마스터') === currentUser.name; }) : allChart;
  var now = new Date();
  var barsEl = document.getElementById('chart-bars'); barsEl.innerHTML = '';
  var sumEl = document.getElementById('chart-summary'); sumEl.innerHTML = '';
  var periodLabel = document.getElementById('chart-period-label');
  var summaryLabel = document.getElementById('chart-summary-label');

  // 차트 탭 활성화
  document.querySelectorAll('.chart-tab').forEach(function(b) {
    var isOn = b.getAttribute('data-period') === currentChartPeriod;
    b.style.color = isOn ? '#D4622A' : '#A8A8A8';
    b.style.borderBottom = isOn ? '2px solid #D4622A' : 'none';
    b.style.fontWeight = isOn ? '700' : '400';
  });

  var periods = [], currentKey = '', labels = [];

  if (currentChartPeriod === 'daily') {
    // 최근 7일
    periodLabel.textContent = '일별 매출 (최근 7일)';
    summaryLabel.textContent = '오늘 요약';
    for (var i = 6; i >= 0; i--) {
      var d = new Date(now); d.setDate(d.getDate() - i);
      var key = d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
      periods.push({key: key, label: (d.getMonth()+1)+'/'+d.getDate()});
    }
    currentKey = todayStr();
  } else if (currentChartPeriod === 'weekly') {
    // 최근 6주
    periodLabel.textContent = '주별 매출 (최근 6주)';
    summaryLabel.textContent = '이번 주 요약';
    for (var i = 5; i >= 0; i--) {
      var d = new Date(now); d.setDate(d.getDate() - (i * 7));
      var weekStart = new Date(d); weekStart.setDate(d.getDate() - d.getDay());
      var weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
      var key = weekStart.getFullYear()+'-'+pad2(weekStart.getMonth()+1)+'-'+pad2(weekStart.getDate());
      periods.push({key: key, endKey: weekEnd.getFullYear()+'-'+pad2(weekEnd.getMonth()+1)+'-'+pad2(weekEnd.getDate()), label: (weekStart.getMonth()+1)+'/'+weekStart.getDate()});
    }
    var thisWeekStart = new Date(now); thisWeekStart.setDate(now.getDate() - now.getDay());
    currentKey = thisWeekStart.getFullYear()+'-'+pad2(thisWeekStart.getMonth()+1)+'-'+pad2(thisWeekStart.getDate());
  } else if (currentChartPeriod === 'monthly') {
    // 최근 6개월
    periodLabel.textContent = '월별 매출 (최근 6개월)';
    summaryLabel.textContent = '이번 달 요약';
    for (var i = 5; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      periods.push({key: d.getFullYear()+'-'+pad2(d.getMonth()+1), label:(d.getMonth()+1)+'월'});
    }
    currentKey = thisMonthStr();
  } else if (currentChartPeriod === 'yearly') {
    // 최근 3년
    periodLabel.textContent = '연별 매출 (최근 3년)';
    summaryLabel.textContent = '올해 요약';
    for (var i = 2; i >= 0; i--) {
      var y = now.getFullYear() - i;
      periods.push({key: String(y), label: y+'년'});
    }
    currentKey = String(now.getFullYear());
  }

  // 매출 계산
  var revenues = periods.map(function(p) {
    return customers.filter(function(c) {
      if (!c.date || c.stage === '상담') return false;
      if (currentChartPeriod === 'daily') return c.date === p.key;
      if (currentChartPeriod === 'weekly') return c.date >= p.key && c.date <= p.endKey;
      if (currentChartPeriod === 'monthly') return c.date.slice(0,7) === p.key;
      if (currentChartPeriod === 'yearly') return c.date.slice(0,4) === p.key;
    }).reduce(function(s,c) { return s+(Number(c.price)||0); }, 0);
  });

  var maxRev = Math.max.apply(null, revenues) || 1;
  periods.forEach(function(p, i) {
    var isCurrent = p.key === currentKey;
    var h = Math.round(revenues[i]/maxRev*100);
    var col = div('flex:1;display:flex;flex-direction:column;align-items:center;gap:4px', [
      span('font-size:9px;color:'+(isCurrent?'#D4622A':'#A8A8A8')+';font-weight:'+(isCurrent?'700':'400'), revenues[i]>0?(revenues[i]/10000).toFixed(0)+'만':'0'),
      div('width:100%;background:'+(isCurrent?'#D4622A':'#E5E0D8')+';height:'+(h||2)+'px', []),
      span('font-size:10px;color:'+(isCurrent?'#D4622A':'#A8A8A8'), p.label)
    ]);
    barsEl.appendChild(col);
  });

  // 현재 기간 요약
  var currentCustomers = customers.filter(function(c) {
    if (!c.date) return false;
    if (currentChartPeriod === 'daily') return c.date === currentKey;
    if (currentChartPeriod === 'weekly') { var p = periods[periods.length-1]; return c.date >= p.key && c.date <= p.endKey; }
    if (currentChartPeriod === 'monthly') return c.date.slice(0,7) === currentKey;
    if (currentChartPeriod === 'yearly') return c.date.slice(0,4) === currentKey;
  });
  var curRev = currentCustomers.filter(function(c){return c.stage!=='상담';}).reduce(function(s,c){return s+(Number(c.price)||0);},0);
  var curPerf = currentCustomers.filter(function(c){return c.stage!=='상담';}).reduce(function(s,c){return s+(Number(c.performanceRevenue)||0);},0);
  var curCon = currentCustomers.filter(function(c){return c.stage!=='상담';}).length;
  var curCons = currentCustomers.length;
  var conv = curCons > 0 ? Math.round(curCon/curCons*100) : 0;

  [['전체 매출',fmt(curRev),'#D4622A'],['성과매출',fmt(curPerf),'#1A1A1A'],['상담 건수',curCons+'건','#1A1A1A'],['계약 건수',curCon+'건','#1A1A1A'],['전환율',conv+'%','#1A1A1A']].forEach(function(row) {
    sumEl.appendChild(div('display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #E5E0D8', [span('font-size:13px;color:#6B6B6B', row[0]), span('font-size:13px;font-weight:700;color:'+row[2], row[1])]));
  });
}

    arr = arr.map(function(c) {
      if (c.clientName === editingCustomerName) {
        var staffName2; if (currentUser && currentUser.role === 'staff') { staffName2 = currentUser.name; } else { var asb2 = document.querySelector('.staff-btn.active'); staffName2 = asb2 ? asb2.getAttribute('data-staff') : (c.staffName||'마스터'); }
        return { clientName:name, phone:phone, addr:document.getElementById('add-addr').value.trim(), space:document.getElementById('add-space').value.trim(), price:c.price||0, performanceRevenue:c.performanceRevenue||0, staffName:staffName2, stage:document.getElementById('add-stage').value, date:document.getElementById('add-date').value, memo:document.getElementById('add-memo').value.trim(), visitCount:c.visitCount||1, createdAt:c.createdAt||new Date().toISOString() };
      } return c;
    });
    saveCustomers(arr); closeAdd(); renderHome(); openDetail(name); showToast('고객 정보가 수정됐습니다');
  } else {
    var existing = arr.find(function(c) { return c.clientName === name; });
    if (existing) { if (!confirm('"' + name + '" 고객이 이미 있습니다.\n재구매 고객으로 업데이트할까요?')) return; }
    var visitCount = existing ? (existing.visitCount||1)+1 : 1;
    if (existing) arr = arr.filter(function(c) { return c.clientName !== name; });
    var staffName; if (currentUser && currentUser.role === 'staff') { staffName = currentUser.name; } else { var asb = document.querySelector('.staff-btn.active'); staffName = asb ? asb.getAttribute('data-staff') : '마스터'; }
    var newCustomer = { clientName:name, phone:phone, addr:document.getElementById('add-addr').value.trim(), space:document.getElementById('add-space').value.trim(), price:0, performanceRevenue:0, staffName:staffName, stage:document.getElementById('add-stage').value, date:document.getElementById('add-date').value, memo:document.getElementById('add-memo').value.trim(), visitCount:visitCount, createdAt:new Date().toISOString() };
    arr.unshift(newCustomer); saveCustomers(arr);
    saveCustomerToDb(newCustomer, function(err, data) { if(!err && data && data[0]) { newCustomer.id = data[0].id; saveCustomers(arr); } });
    closeAdd(); renderHome(); openDetail(name);
    showToast('고객이 추가됐습니다');
  }
}

function openEstimate(name) {
  if (name) { try { var arr = loadCustomers(); var c = arr.find(function(x) { return x.clientName === name; }); if (c) localStorage.setItem('dah_open_customer', JSON.stringify({
          name: c.clientName,
          phone: c.phone,
          addr: c.addr,
          visitCount: c.visitCount || 1,
          customer_type: c.visitCount > 1 ? '재구매' : (c.stage === 'AS' ? 'AS' : '신규'),
          stage: c.stage || '상담',
          memo: c.memo || ''
        })); } catch(e) {} }
  window.location.href = 'dah-estimate.html';
}

// ── 카카오톡 복사 (보조) ──────────────────────────
var KAKAO_LABELS = {followup:'팔로업', contract:'계약금 안내', measure:'실측 안내', balance:'잔금 안내'};
function copyKakao(type) {
  var arr = loadCustomers(); var c = arr.find(function(x) { return x.clientName === currentDetailName; });
  if (!c) return; var n = c.clientName;
  var msgs = {
    followup: '안녕하세요, ' + n + '님 🙂\n드로잉엣홈입니다.\n상담 후 궁금하신 점은 없으셨나요?\n편하게 말씀해 주세요!',
    contract: '안녕하세요, ' + n + '님 🙂\n드로잉엣홈입니다.\n계약금(50%)이 확인되면 실측 일정을 잡아드리겠습니다.',
    measure: '안녕하세요, ' + n + '님 🙂\n드로잉엣홈입니다.\n실측 방문 일정을 조율하고 싶습니다.\n편하신 날짜와 시간을 알려주세요!',
    balance: '안녕하세요, ' + n + '님 🙂\n드로잉엣홈입니다.\n잔금 납부가 완료되면 시공 일정이 확정됩니다. 감사합니다!'
  };
  var msg = msgs[type] || '';
  if (!confirm('발송할 메시지:\n\n' + msg + '\n\n복사하시겠습니까?')) return;
  try { var logs = JSON.parse(localStorage.getItem('dah_kakao_log') || '[]'); logs.unshift({ name: n, type: KAKAO_LABELS[type]||type, date: todayStr(), time: new Date().toLocaleTimeString() }); localStorage.setItem('dah_kakao_log', JSON.stringify(logs.slice(0,100))); } catch(e) {}
  try { if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(msg).then(function() { showToast('복사됐습니다 — 카카오톡에 붙여넣기 하세요'); renderKakaoLog(); }); } else { var ta = document.createElement('textarea'); ta.value = msg; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('복사됐습니다 — 카카오톡에 붙여넣기 하세요'); renderKakaoLog(); } } catch(e) { showToast('복사 실패'); }
}

function renderKakaoLog() {
  var logEl = document.getElementById('kakao-log'); if (!logEl) return;
  try {
    var logs = JSON.parse(localStorage.getItem('dah_kakao_log') || '[]').filter(function(l) { return l.name === currentDetailName; });
    if (logs.length === 0) { logEl.textContent = '발송 이력 없음'; return; }
    logEl.innerHTML = '';
    logs.slice(0,3).forEach(function(l) {
      var methodBadge = l.method === '알림톡' ? ' [알림톡]' : ' [복사]';
      logEl.appendChild(div('font-size:11px;color:#6B6B6B;padding:3px 0;border-bottom:1px solid #E5E0D8', [span('', l.date + ' ' + l.time + ' — ' + l.type + methodBadge)]));
    });
  } catch(e) {}
}

function backupData() {
  try { var data = {customers: loadCustomers(), exported: new Date().toISOString(), version: '1.0'}; var json = JSON.stringify(data, null, 2); var blob = new Blob([json], {type: 'application/json'}); var url = URL.createObjectURL(blob); var a = document.createElement('a'); var d = new Date(); a.href = url; a.download = 'dah_backup_' + d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate()) + '.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); showToast('백업 파일이 저장됐습니다'); } catch(e) { alert('백업 실패: ' + e.message); }
}

function getMonthRevenue(customers, monthKey) {
  return customers.filter(function(c) { return (c.date||'').slice(0,7) === monthKey && c.stage !== '상담'; }).reduce(function(s,c) { return s + (Number(c.price)||0); }, 0);
}

// ── 설정 탭 ──────────────────────────────────
function renderSettings() {

  // 비밀번호 변경

  ]);

    pwCard.appendChild(inp);
  });
  pwCard.appendChild(btn('width:100%;padding:10px;background:#1A1A1A;color:#fff;border:none;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer', '비밀번호 변경', function() {
    var cur = document.getElementById('change-pw-current2');
    var nw = document.getElementById('change-pw-new2');
    var con = document.getElementById('change-pw-confirm2');
    if(cur.value !== MASTER_PW) { alert('현재 비밀번호가 틀렸습니다.'); cur.value=''; return; }
    if(nw.value.length < 4) { alert('새 비밀번호는 4자 이상이어야 합니다.'); return; }
    if(nw.value !== con.value) { alert('새 비밀번호가 일치하지 않습니다.'); con.value=''; return; }
    MASTER_PW = nw.value;
    try { localStorage.setItem('dah_master_pw', MASTER_PW); } catch(e){}
    cur.value=''; nw.value=''; con.value='';
    showToast('비밀번호가 변경됐습니다');
  }));
  wrap.appendChild(pwCard);

  // 담당자 관리
  var staffCard = div('background:#fff;margin-bottom:10px;padding:14px 16px', [
    span('font-size:11px;font-weight:700;color:#A8A8A8;letter-spacing:1.2px;display:block;margin-bottom:12px', '👤 담당자 관리')
  ]);
  var staffList = getStaffList();
  staffList.forEach(function(name) {
    var row = div('display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #E5E0D8', [
      span('font-size:13px;font-weight:700', name),
      btn('font-size:11px;color:#d94f4f;background:none;border:1px solid #d94f4f;padding:3px 8px;cursor:pointer;font-family:inherit', '삭제', function() {
        if(!confirm(name + ' 담당자를 삭제할까요?')) return;
        var list = getStaffList().filter(function(s){ return s !== name; });
        try { localStorage.setItem('dah_staff_list', JSON.stringify(list)); } catch(e){}
        renderSettings(); showToast(name + ' 담당자가 삭제됐습니다');
      })
    ]);
    staffCard.appendChild(row);
  });
  var addStaffWrap = div('display:flex;gap:8px;margin-top:10px', []);
  var staffInput = el('input', {type:'text', placeholder:'새 담당자 이름', style:'flex:1;padding:9px 10px;border:1px solid #E5E0D8;font-size:13px;font-family:inherit;outline:none'});
  addStaffWrap.appendChild(staffInput);
  addStaffWrap.appendChild(btn('padding:9px 14px;background:#1A1A1A;color:#fff;border:none;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer', '추가', function() {
    var name = staffInput.value.trim();

    var list = getStaffList();
    if(list.indexOf(name) >= 0) { showToast('이미 있는 담당자입니다'); return; }
    list.push(name);
    try { localStorage.setItem('dah_staff_list', JSON.stringify(list)); } catch(e){}
    staffInput.value = '';
    renderSettings(); showToast(name + ' 담당자가 추가됐습니다');
  }));
  staffCard.appendChild(addStaffWrap);
  wrap.appendChild(staffCard);

  // 목표 매출
  var goalCard = div('background:#fff;margin-bottom:10px;padding:14px 16px', [
    span('font-size:11px;font-weight:700;color:#A8A8A8;letter-spacing:1.2px;display:block;margin-bottom:12px', '🎯 담당자별 월 목표 매출')
  ]);
  var allStaffs = ['마스터'].concat(getStaffList());
  allStaffs.forEach(function(staff) {
    var goalKey = 'dah_goal_'+staff;
    var curGoal = Number(localStorage.getItem(goalKey)||0);
    var gRow = div('margin-bottom:10px', [
      span('font-size:12px;font-weight:700;display:block;margin-bottom:4px', staff)
    ]);
    var gInput = el('input', {type:'number', placeholder:'목표 금액 (원)', value:curGoal>0?String(curGoal):'', style:'width:100%;padding:9px 10px;border:1px solid #E5E0D8;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box'});
    (function(k, s) {
      gInput.addEventListener('change', function() {
        var v = Number(this.value.replace(/[^0-9]/g,''));
        if(v>0) { localStorage.setItem(k, String(v)); showToast(s+' 목표 설정됐습니다'); }
      });

    var url = webhookInput.value.trim();
    try { localStorage.setItem('dah_webhook_url', url); } catch(e){}
    showToast('웹훅 URL이 저장됐습니다');
  }));

  ]);

  var restoreInput = el('input', {type:'file', accept:'.json', style:'display:none', id:'restore-input'});
  restoreInput.addEventListener('change', function(e) {
    var file = e.target.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if(data.customers) {
          saveCustomers(data.customers);
          showToast('복원 완료! ' + data.customers.length + '건');
          renderHome();
        }
      } catch(err) { alert('파일 형식이 올바르지 않습니다'); }

  dataCard.appendChild(restoreInput);
  dataCard.appendChild(btn('width:100%;padding:11px;background:#fff;border:1px solid #E5E0D8;font-size:13px;font-family:inherit;cursor:pointer', '📂 복원 (JSON 업로드)', function() { document.getElementById('restore-input').click(); }));

// ── 시공 이력 조회 ──────────────────────────────
function loadEstimates(customerName, callback) {
  sbXHR('GET', 'estimates?customer_name=eq.' + encodeURIComponent(customerName) + '&order=created_at.desc', null, function(err, data) {
    if (err) { callback([]); return; }
    callback(data || []);
  });
}

function showEstimateHistory(customerName) {
  loadEstimates(customerName, function(estimates) {
    var body = document.getElementById('detail-body');
    var histSection = document.getElementById('estimate-history-section');
    if (histSection) histSection.remove();

    var section = el('div', {id:'estimate-history-section', style:'margin-top:14px'});
    section.appendChild(span('font-size:11px;color:#A8A8A8;letter-spacing:1.2px;display:block;margin-bottom:8px', '📋 시공 이력 (' + estimates.length + '건)'));

    if (estimates.length === 0) {
      section.appendChild(span('font-size:13px;color:#A8A8A8;display:block;text-align:center;padding:12px 0', '시공 이력이 없습니다'));
    } else {
      estimates.forEach(function(e) {
        var row = div('padding:10px;border:1px solid #E5E0D8;margin-bottom:6px;background:#F9F9F9', [
          div('display:flex;justify-content:space-between;margin-bottom:4px', [
            span('font-size:12px;font-weight:700', e.space || '—'),
            span('font-size:12px;color:#D4622A;font-weight:700', (Number(e.price)||0).toLocaleString()+'원')
          ]),
          e.product ? span('font-size:11px;color:#6B6B6B;display:block', '제품: ' + e.product) : null,
          e.fabric ? span('font-size:11px;color:#6B6B6B;display:block', '원단: ' + e.fabric) : null,
          (e.width && e.height) ? span('font-size:11px;color:#6B6B6B;display:block', '사이즈: ' + e.width + ' × ' + e.height + 'cm') : null,
          span('font-size:10px;color:#A8A8A8;display:block;margin-top:4px', (e.date||'') + ' · ' + (e.stage||'') + ' · ' + (e.staff_name||''))
        ]);
        section.appendChild(row);
      });
    }
    body.appendChild(section);
  });
}

document.getElementById('pipe-search').addEventListener('input', renderPipe);

// ── 초기화 ──────────────────────────────────
(function() {
  try {
    var saved = JSON.parse(localStorage.getItem('dah_session') || 'null');
    if (saved && saved.name && saved.role) {
      var validStaffs = ['마스터'].concat(getStaffList());
