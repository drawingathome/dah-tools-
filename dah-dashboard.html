<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>드로잉엣홈 대시보드</title>
<style>
/* ============================================
   드로잉엣홈 대시보드 — CSS v2 (전문기업급)
   컨셉: 고급 인테리어 브랜드 내부 운영툴
   컬러: 다크헤더 + 순백 카드 + 웜골드 포인트
   타이포: 전체 1~2px 업, 단계뱃지 pill형
   ============================================ */

/* ── 리셋 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:#F5F0EB;
  color:#282828;
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh
}

/* ── 단계 뱃지 컬러 시스템 ── */
:root{
  --stage-상담:     #282828;
  --stage-계약금:   #F06E2D;
  --stage-실측:     #6B6B6B;
  --stage-잔금:     #282828;
  --stage-시공:     #F06E2D;
  --stage-완료:     #B0A99F;
}

/* ── 로그인 ── */
.login-screen{
  position:fixed;inset:0;
  background:#F5F0EB;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:999;padding:0 24px
}
.login-logo-wrap{text-align:center;margin-bottom:36px}
.login-logo-wrap img{height:28px;width:auto;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.login-brand-sub{font-size:12px;letter-spacing:3px;color:#B0A99F;text-transform:uppercase}
.login-card{
  background:#fff;border-radius:16px;
  border:1px solid #EEE6DC;
  padding:28px;width:100%;max-width:320px;
  box-shadow:0 4px 24px rgba(0,0,0,0.06)
}
.login-sub{font-size:13px;color:#B0A99F;text-align:center;margin-bottom:16px}
.user-btn{
  width:100%;display:flex;align-items:center;gap:14px;
  padding:15px 18px;border-radius:12px;
  border:1.5px solid #EEE6DC;background:#fff;
  cursor:pointer;text-align:left;font-family:inherit;
  transition:all 0.15s
}
.user-btn:hover{border-color:#282828;background:#FAF7F5}
.user-btn.master{border-color:#F06E2D;background:#FAF7F5}
.user-btn-icon{font-size:22px;flex-shrink:0}
.user-btn-name{display:block;font-size:15px;font-weight:700;color:#282828;margin-bottom:2px}
.user-btn-desc{display:block;font-size:12px;color:#B0A99F}
.master-pw-wrap{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.master-pw-wrap input{
  width:100%;height:42px;padding:0 14px;
  border:1.5px solid #EEE6DC;border-radius:10px;
  font-size:15px;font-family:inherit;outline:none
}
.master-pw-wrap input:focus{border-color:#F06E2D}
.master-pw-wrap button{
  width:100%;height:42px;background:#282828;color:#fff;
  border:none;border-radius:10px;
  font-size:15px;font-weight:700;font-family:inherit;cursor:pointer
}
.master-pw-error{font-size:12px;color:#F06E2D;text-align:center;display:none}

/* ── 헤더 ── */
.hd{
  position:sticky;top:0;z-index:100;
  background:#282828;
  height:52px;
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 16px;
  box-shadow:0 1px 0 rgba(255,255,255,0.07)
}
.hd-logo-img{height:18px;width:auto;filter:brightness(0) invert(1);opacity:0.92;flex-shrink:0}
.hd-right{display:flex;align-items:center;gap:7px}
.hd-badge{font-size:12px;color:rgba(255,255,255,0.4);margin-right:2px;flex-shrink:0}
.hd-btn{
  height:30px;padding:0 12px;
  font-size:12px;font-weight:700;font-family:inherit;
  border-radius:7px;cursor:pointer;
  white-space:nowrap;border:none;flex-shrink:0;
  letter-spacing:0.2px
}
.hd-btn-sub{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65)}
.hd-btn-new{background:rgba(255,255,255,0.15);color:#fff}
.hd-btn-est{background:#F06E2D;color:#282828;font-weight:800}

/* ── KPI 바 ── */
.kpi-bar{
  background:#282828;
  padding:10px 16px 14px;
  position:sticky;top:52px;z-index:99
}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi-card{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:12px 14px
}
.kpi-num{font-size:22px;font-weight:800;color:#fff;line-height:1;display:block;margin-bottom:5px}
.kpi-num em{font-size:14px;font-weight:400;opacity:0.45;font-style:normal}
.kpi-label{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.5px}

/* ── 단계칩 ── */
.stage-chips{display:flex;gap:5px}
.sc{
  flex:1;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;padding:7px 2px;
  text-align:center;cursor:pointer;
  transition:background 0.1s
}
.sc:hover,.sc.active{background:rgba(255,255,255,0.18)}
.sc-n{font-size:15px;font-weight:800;color:#fff;display:block;line-height:1.3}
.sc-n.zero{color:rgba(255,255,255,0.18)}
.sc-l{font-size:11px;color:rgba(255,255,255,0.45);display:block;margin-top:1px}

/* ── 탭바 ── */
.tabs{
  background:#fff;
  border-bottom:1px solid #EEE6DC;
  display:flex;
  position:sticky;z-index:98;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:52px;height:44px;
  font-size:14px;font-weight:600;font-family:inherit;
  color:#B0A99F;background:none;border:none;
  border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap
}
.tab.on,.tab

/* ── 오늘 날짜 배너 ── */
.today-banner{
  background:#fff;
  border-bottom:1px solid #EEE6DC;
  padding:10px 16px;
  display:flex;align-items:baseline;gap:10px
}
.today-date{
  font-size:22px;font-weight:800;color:#282828;
  letter-spacing:-0.5px
}
.today-dow{
  font-size:13px;font-weight:600;
  color:#F06E2D;letter-spacing:1px;
  text-transform:uppercase
}
.today-sub{font-size:12px;color:#B0A99F;margin-left:auto}

/* ── 콘텐츠 래퍼 ── */
.wrap{padding:12px 0 32px;max-width:640px;margin:0 auto}

/* ── 카드 ── */
.card{
  background:#fff;
  border-top:1px solid #EEE6DC;
  border-bottom:1px solid #EEE6DC;
  margin-bottom:8px
}
.card-head{
  padding:12px 16px 11px;
  border-bottom:1px solid #EEE6DC;
  display:flex;align-items:center;
  justify-content:space-between
}
.card-head-row{
  display:flex;align-items:center;
  justify-content:space-between;width:100%
}
.card-title,.card-label{
  font-size:11px;font-weight:700;
  color:#B0A99F;letter-spacing:1px;
  text-transform:uppercase
}
.card-count{font-size:12px;color:#B0A99F}
.sec{
  font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:#B0A99F;
  padding:12px 16px 8px
}

/* ── 새 견적서 버튼 ── */
.new-est-btn{
  display:flex;align-items:center;justify-content:center;
  width:calc(100% - 28px);margin:0 14px 8px;
  height:48px;
  background:#282828;color:#fff;
  border:none;border-radius:12px;
  font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;letter-spacing:0.3px
}
.new-est-btn:active{background:#282828}

/* ── 처리필요 / 일정 아이템 ── */
.action-item{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:13px 16px;
  border-bottom:1px solid #F5F0EB
}
.action-item:last-child{border-bottom:none}
.ai-left{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0}
.ai-bar{
  width:3px;min-height:38px;border-radius:2px;
  background:#F06E2D;flex-shrink:0;margin-top:2px
}
.ai-bar.warn{background:#F06E2D}
.ai-name{
  font-size:15px;font-weight:700;color:#282828;
  margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.ai-meta{font-size:13px;color:#6B6B6B;line-height:1.6}
.ai-tag{
  display:inline-block;
  background:#F5F0EB;border:1px solid #EEE6DC;
  border-radius:4px;font-size:11px;color:#6B6B6B;
  padding:1px 6px;margin-left:5px;
  vertical-align:middle;white-space:nowrap
}
.ai-tag.today{background:#FAF7F5;border-color:#EEE6DC;color:#F06E2D}
.stage-btn{
  font-size:12px;font-weight:700;font-family:inherit;
  padding:5px 11px;border-radius:20px;
  border:none;
  color:#fff;white-space:nowrap;cursor:pointer;
  flex-shrink:0;margin-left:10px
}
.stage-btn.urgent{background:#F06E2D}
.stage-btn.today-badge{background:#F06E2D}

/* 단계별 stage-btn 색상 */
.stage-btn[data-stage="상담"]  { background:var(--stage-상담); }
.stage-btn[data-stage="계약금"]{ background:var(--stage-계약금); }
.stage-btn[data-stage="실측"]  { background:var(--stage-실측); }
.stage-btn[data-stage="잔금"]  { background:var(--stage-잔금); }
.stage-btn[data-stage="시공"]  { background:var(--stage-시공); }
.stage-btn[data-stage="완료"]  { background:var(--stage-완료); }

/* ── 성과 통계 ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr)}
.stat-item{
  padding:14px 8px;text-align:center;
  border-right:1px solid #EEE6DC
}
.stat-item:last-child{border-right:none}
.stat-val{
  font-size:14px;font-weight:800;color:#282828;
  display:block;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.stat-lbl{font-size:11px;color:#B0A99F;letter-spacing:0.3px}

/* ── 담당자 성과 ── */
.perf-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 16px;border-bottom:1px solid #F5F0EB
}
.perf-item:last-child{border-bottom:none}
.perf-name{font-size:15px;font-weight:700;color:#282828}
.perf-right{text-align:right}
.perf-rev{font-size:15px;font-weight:800;color:#282828}
.perf-sub{font-size:12px;color:#B0A99F;margin-top:2px}

/* ── 진행현황 ── */
.pipe-stage-head{
  padding:10px 16px;
  background:#FAF7F5;
  border-top:1px solid #EEE6DC;
  border-bottom:1px solid #EEE6DC;
  display:flex;align-items:center;
  justify-content:space-between
}
.pipe-stage-label{
  font-size:13px;font-weight:700;color:#282828;
  display:flex;align-items:center;gap:8px
}
.pipe-stage-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:#282828;color:#fff;
  font-size:12px;font-weight:800;flex-shrink:0
}
.pipe-stage-num.empty{background:#EEE6DC}
.pipe-stage-count{font-size:12px;color:#B0A99F}
.pipe-item{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:13px 16px;
  border-bottom:1px solid #F5F0EB;
  cursor:pointer
}
.pipe-item:last-child{border-bottom:none}
.pipe-item:active{background:#FAF7F5}
.pipe-left{flex:1;min-width:0}
.pipe-name{
  font-size:15px;font-weight:700;color:#282828;
  margin-bottom:4px;
  display:flex;align-items:center;gap:7px
}
.pipe-sub{font-size:13px;color:#B0A99F}
.pipe-right{text-align:right;flex-shrink:0;margin-left:12px}
.pipe-price{font-size:15px;font-weight:700;color:#282828;margin-bottom:3px}
.pipe-date{font-size:12px;color:#B0A99F}

/* ── 단계 pill 뱃지 ── */
.stage-pill{
  display:inline-flex;align-items:center;justify-content:center;
  padding:3px 9px;border-radius:20px;
  font-size:12px;font-weight:700;color:#fff;
  flex-shrink:0;white-space:nowrap
}
.stage-pill.상담{background:#282828;color:#fff}
.stage-pill.계약금{background:#F06E2D;color:#fff}
.stage-pill.실측{background:#6B6B6B;color:#fff}
.stage-pill.잔금{background:#282828;color:#fff}
.stage-pill.시공{background:#F06E2D;color:#fff}
.stage-pill.완료{background:#B0A99F;color:#fff}

/* ── 고객목록 ── */
.search-top{padding:10px 14px 8px;background:#fff;border-bottom:1px solid #EEE6DC;margin-bottom:8px}
.search-bar-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none}
.search-input-clean{
  width:100%;height:42px;
  padding:0 14px 0 36px;
  border:1.5px solid #EEE6DC;border-radius:10px;
  background:#fff;font-size:15px;font-family:inherit;
  color:#282828;outline:none
}
.search-input-clean:focus{border-color:#F06E2D}
.archived-check{
  display:flex;align-items:center;gap:7px;
  font-size:13px;color:#B0A99F;cursor:pointer;
  margin-top:9px
}
.archived-check input[type="checkbox"]{width:14px;height:14px;accent-color:#282828;cursor:pointer}
.cust-item{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:13px 16px;
  border-bottom:1px solid #F5F0EB;cursor:pointer
}
.cust-item:last-child{border-bottom:none}
.cust-item:active{background:#FAF7F5}
.ci-left{flex:1;min-width:0}
.ci-name{
  font-size:15px;font-weight:700;color:#282828;
  margin-bottom:4px;
  display:flex;align-items:center;gap:7px
}
.ci-sub{font-size:13px;color:#B0A99F}
.ci-right{text-align:right;flex-shrink:0;margin-left:12px}
.ci-price{font-size:15px;font-weight:700;color:#282828;margin-bottom:4px}
.ci-stage{font-size:12px;font-weight:700}

/* ── 재구매 태그 ── */
.rebuy-tag{
  font-size:11px;font-weight:700;
  background:#FAF7F5;color:#F06E2D;
  border:1px solid #EEE6DC;border-radius:4px;
  padding:2px 6px;flex-shrink:0
}

/* ── 달력 ── */
.cal-day-cell{
  min-height:40px;display:flex;flex-direction:column;
  align-items:center;padding:3px 1px;
  cursor:pointer;border-radius:6px;position:relative
}
.cal-day-cell:hover{background:#FAF7F5}
.cal-day-num{
  font-size:14px;font-weight:600;color:#282828;
  width:26px;height:26px;display:flex;
  align-items:center;justify-content:center;
  border-radius:50%;line-height:1;flex-shrink:0
}
.cal-day-cell.today 
.cal-day-cell.other-month 
.cal-day-cell.selected 
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:2px}
.cal-dot{width:5px;height:5px;border-radius:50%}

/* ── 달력 일정 리스트 ── */
.cal-ev-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border-bottom:1px solid #F5F0EB;cursor:pointer
}
.cal-ev-row:last-child{border-bottom:none}
.cal-ev-row:active{background:#FAF7F5}
.cal-ev-date{text-align:center;min-width:24px;flex-shrink:0}
.cal-ev-day{font-size:15px;font-weight:800;color:#282828;display:block;line-height:1.2}
.cal-ev-dow{font-size:11px;color:#B0A99F;display:block}
.cal-ev-type{width:3px;min-height:38px;border-radius:2px;flex-shrink:0}
.type-상담{background:#282828}
.type-실측{background:#6B6B6B}
.type-시공{background:#F06E2D}
.cal-ev-info{flex:1;min-width:0}
.cal-ev-name{
  font-size:15px;font-weight:700;color:#282828;
  margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.cal-ev-sub{font-size:13px;color:#B0A99F}
.cal-ev-badge{
  font-size:12px;font-weight:700;
  padding:4px 9px;border-radius:20px;
  color:#fff;white-space:nowrap;flex-shrink:0
}

/* ── 매출 차트 ── */
.chart-tab-bar{display:flex;background:#fff;border-bottom:1px solid #EEE6DC;margin-bottom:8px}
.chart-tab{
  flex:1;padding:11px 0;
  font-size:14px;font-weight:600;font-family:inherit;
  text-align:center;cursor:pointer;
  color:#B0A99F;border:none;background:transparent;
  border-bottom:2px solid transparent
}
.chart-tab.on{color:#F06E2D;border-bottom-color:#F06E2D;font-weight:700}
.chart-bar{background:#F06E2D;border-radius:4px 4px 0 0;transition:height 0.3s}
#chart-bars{padding:0 16px;margin:0}

/* ── 고객 상세 모달 ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.5);
  z-index:200;display:none;
  align-items:flex-end;justify-content:center
}
.overlay.open{display:flex}
.modal-box{
  background:#fff;width:100%;max-width:640px;
  border-radius:18px 18px 0 0;
  max-height:90vh;overflow-y:auto;
  padding-bottom:env(safe-area-inset-bottom,0)
}
.modal-top-bar{
  width:40px;height:4px;border-radius:2px;
  background:#EEE6DC;margin:12px auto 0
}

/* ── 고객추가 폼 ── */
.form-row{margin-bottom:16px}
.form-row:last-child{margin-bottom:0}
.form-label{font-size:12px;font-weight:700;color:#6B6B6B;display:block;margin-bottom:6px;letter-spacing:0.3px}
.form-required{color:#F06E2D}
.form-input{
  width:100%;height:44px;padding:0 14px;
  border:1.5px solid #EEE6DC;border-radius:10px;
  font-size:15px;font-family:inherit;
  background:#fff;color:#282828;outline:none;
  -webkit-appearance:none
}
.form-input:focus{border-color:#F06E2D}

/* ── 담당자 버튼 ── */
.staff-btn{
  flex:1;padding:10px 12px;border-radius:10px;
  border:1.5px solid #EEE6DC;background:#FAF7F5;
  font-size:14px;font-weight:600;font-family:inherit;
  color:#282828;cursor:pointer;text-align:center
}
.staff-btn.on{background:#282828;border-color:#282828;color:#fff}

/* ── 뱃지 ── */
.badge{
  font-size:12px;font-weight:700;
  padding:4px 9px;border-radius:20px;
  white-space:nowrap;display:inline-block;
  color:#fff
}

/* ── 설정 ── */
.settings-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;border-bottom:1px solid #F5F0EB
}
.settings-row:last-child{border-bottom:none}

/* ── 공통 유틸 ── */

.master-only{display:none}
.role-master 
.role-master .stat-grid

/* ── 토스트 ── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  background:#282828;color:#fff;
  padding:11px 22px;border-radius:22px;
  font-size:14px;font-weight:600;
  opacity:0;pointer-events:none;
  z-index:999;white-space:nowrap;
  transition:opacity 0.2s;
  box-shadow:0 4px 16px rgba(0,0,0,0.2)
}
</style>
</head>
<body>

<!-- 로그인 화면 -->

    </div>
  </div>
  <div id="pipe-list"></div>
</div>
<div id="search" style="display:none" class="wrap">
  <div class="search-top">
    <div class="search-bar-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B0A99F" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

      </div>
    </div>
    <div id="search-list"></div>
  </div>
</div>
<div id="cal" style="display:none" class="wrap">
  <!-- 달력 카드 -->
  <div class="card" style="padding:14px 14px 10px">
    <!-- 월 네비 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button id="cal-prev" style="background:none;border:none;font-size:18px;cursor:pointer;color:#282828;padding:2px 8px;line-height:1">‹</button>
      <div id="cal-month-label" style="font-size:15px;font-weight:700;color:#282828;letter-spacing:0.3px"></div>
      <button id="cal-next" style="background:none;border:none;font-size:18px;cursor:pointer;color:#282828;padding:2px 8px;line-height:1">›</button>
    </div>
    <!-- 요일 헤더 -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px">
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">일</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">월</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">화</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">수</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">목</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">금</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:#B0A99F;padding:3px 0">토</div>
    </div>
    <!-- 날짜 그리드 -->
    <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px"></div>
  </div>
  <!-- 일정 목록 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-row">
        <span class="card-title" id="cal-list-label">6월 전체 일정</span>
      </div>
    </div>
    <div id="cal-list"></div>
  </div>
</div>
<div id="chart" style="display:none" class="wrap">

  <div class="card"><div class="sec" id="chart-summary-label">오늘 요약</div><div id="chart-summary" style="padding:0 16px"></div></div>
</div>

<div class="overlay" id="detail-overlay">

    <div class="modal-top-bar"></div>
    <div style="padding:16px;border-bottom:1px solid #EEE6DC;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:15px;font-weight:700" id="detail-name"></div>
      <button id="detail-close-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#B0A99F">✕</button>
    </div>
    <div style="padding:16px" id="detail-body"></div>
  </div>
</div>

<!-- 고객 추가 모달 -->
<div class="overlay" id="add-overlay">
  <div class="modal-box">
    <!-- 헤더 -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 16px;background:#fff;border-radius:14px 14px 0 0;border-bottom:1px solid #EEE6DC">
      <div style="font-size:15px;font-weight:700;color:#282828" id="add-modal-title">고객 추가</div>
      <button id="add-close-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#B0A99F;line-height:1;padding:2px 4px">✕</button>
    </div>
    <!-- 폼 본문 -->
    <div style="padding:20px 20px 0">

      <!-- 기본 정보 -->
      <div style="background:#fff;border-radius:10px;padding:16px 16px 4px;margin-bottom:12px;border:1px solid #EEE6DC">
        <div style="font-size:11px;font-weight:700;color:#B0A99F;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px">기본 정보</div>
        <div class="form-row">
          <label class="form-label">고객명 <span class="form-required">*</span></label>
          <input class="form-input" id="add-name" placeholder="홍길동">
        </div>
        <div class="form-row">
          <label class="form-label">연락처 <span class="form-required">*</span></label>
          <input class="form-input" id="add-phone" placeholder="010-0000-0000">
        </div>
        <div class="form-row">
          <label class="form-label">주소</label>
          <div style="display:flex;gap:6px">
            <input class="form-input" id="add-addr" placeholder="서울 서초구 반포동" style="flex:1;min-width:0">
            <button type="button" onclick="openKakaoAddr('add-addr')"
              style="padding:0 14px;background:#282828;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0">
              🔍 검색
            </button>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">공간·품목</label>
          <input class="form-input" id="add-space" placeholder="예) 거실+안방, 블라인드">
        </div>
        <div class="form-row">
          <label class="form-label">메모</label>
          <input class="form-input" id="add-memo" placeholder="레일 재활용, 샤시 간섭 등">
        </div>
      </div>

      <!-- 일정 & 단계 -->
      <div style="background:#fff;border-radius:10px;padding:16px 16px 4px;margin-bottom:12px;border:1px solid #EEE6DC">
        <div style="font-size:11px;font-weight:700;color:#B0A99F;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px">일정 & 단계</div>
        <div class="form-row">
          <label class="form-label">단계</label>
          <select class="form-input" id="add-stage">
            <option value="상담">① 상담</option>
            <option value="계약금">② 계약금 납부</option>
            <option value="실측">③ 실측 예정</option>
            <option value="잔금">④ 잔금 대기</option>
            <option value="시공">⑤ 시공 예정</option>
            <option value="완료">⑥ 시공 완료</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-row">
            <label class="form-label">상담일</label>
            <input class="form-input" type="date" id="add-date" style="padding:10px 8px;font-size:14px">
          </div>
          <div class="form-row">
            <label class="form-label">실측 예정일</label>
            <input class="form-input" type="date" id="add-measure" style="padding:10px 8px;font-size:14px">
          </div>
        </div>
        <div class="form-row" style="margin-top:10px;padding-bottom:4px">
          <label class="form-label">시공 예정일</label>
          <input class="form-input" type="date" id="add-install" style="padding:10px 8px;font-size:14px">
        </div>
      </div>

      <!-- 담당자 -->
      <div style="background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #EEE6DC">
        <div style="font-size:11px;font-weight:700;color:#B0A99F;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">담당자</div>
        <div id="staff-btn-wrap" style="display:flex;gap:8px"></div>

function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function fmt(n) { return (Number(n) || 0).toLocaleString() + '원'; }

function daysDiff(dateStr) { return Math.floor((new Date() - new Date(dateStr)) / 86400000); }
function fmtPhone(v) {
  var d = v.replace(/[^0-9]/g, '');
  if (d.slice(0,2) === '02') {
    if (d.length <= 6) return d.slice(0,2) + '-' + d.slice(2);
    if (d.length <= 9) return d.slice(0,2) + '-' + d.slice(2,5) + '-' + d.slice(5);
    return d.slice(0,2) + '-' + d.slice(2,6) + '-' + d.slice(6,10);
  }
  if (d.length <= 7) return d.slice(0,3) + '-' + d.slice(3);
  return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7,11);
}

function sbXHR(method, path, data, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open(method, SUPABASE_URL + '/rest/v1/' + path, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Prefer', method === 'POST' ? 'return=representation' : 'return=minimal');
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      var result = null;
      try { result = xhr.responseText ? JSON.parse(xhr.responseText) : []; } catch(e) { result = []; }
      callback(null, result);
    } else { callback({status: xhr.status, text: xhr.responseText}, null); }
  };
  xhr.onerror = function() { callback({status: 0, text: 'network error'}, null); };
  xhr.send(data ? JSON.stringify(data) : null);
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'style') e.style.cssText = attrs[k];
    else if (k === 'class') e.className = attrs[k];
    else if (k === 'text') e.textContent = attrs[k];
    else e.setAttribute(k, attrs[k]);
  });
  if (children) children.forEach(function(c) { if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}
function div(style, children) { return el('div', {style: style}, children); }

var calCurrentYear = new Date().getFullYear();
var calCurrentMonth = new Date().getMonth(); // 0-based
var calSelectedDate = null;

function getCalEvents(customers, year, month) {
  // 해당 월의 모든 일정 수집 (상담일 / 실측 / 시공)
  var monStr = year + '-' + pad2(month+1);
  var events = [];
  customers.forEach(function(c) {
    if ((c.date||'').slice(0,7) === monStr)
      events.push({date:c.date, name:c.clientName, space:c.space||'—', type:'상담', stage:c.stage, cust:c});
    if ((c.measureDate||'').slice(0,7) === monStr)
      events.push({date:c.measureDate, name:c.clientName, space:c.space||'—', type:'실측', stage:c.stage, cust:c});
    if ((c.installDate||'').slice(0,7) === monStr)
      events.push({date:c.installDate, name:c.clientName, space:c.space||'—', type:'시공', stage:c.stage, cust:c});
  });
  events.sort(function(a,b){ return a.date < b.date ? -1 : 1; });
  return events;
}

function renderCal() {
  var allCal = loadCustomers();
  var customers = (currentUser && currentUser.role === 'staff') ? allCal.filter(function(c) { return (c.staffName||'마스터') === currentUser.name; }) : allCal;
  var yr = calCurrentYear, mo = calCurrentMonth;
  var today = todayStr();
  var DOW = ['일','월','화','수','목','금','토'];

  // 월 레이블
  var lbl = document.getElementById('cal-month-label');
  if (lbl) lbl.textContent = yr + '년 ' + (mo+1) + '월';

  // 이벤트 맵
  var events = getCalEvents(customers, yr, mo);
  var evMap = {}; // date → [type, ...]
  events.forEach(function(ev) {
    if (!evMap[ev.date]) evMap[ev.date] = [];
    if (evMap[ev.date].indexOf(ev.type) < 0) evMap[ev.date].push(ev.type);
  });

  // 달력 그리드
  var grid = document.getElementById('cal-grid');
  if (!grid) return;
  grid.innerHTML = '';

  var firstDay = new Date(yr, mo, 1).getDay(); // 0=일
  var daysInMonth = new Date(yr, mo+1, 0).getDate();
  var daysInPrev = new Date(yr, mo, 0).getDate();
  var totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (var i = 0; i < totalCells; i++) {
    var cell = document.createElement('div');
    cell.className = 'cal-day-cell';
    var dayNum, dateStr, isOther = false;
    if (i < firstDay) {
      dayNum = daysInPrev - firstDay + i + 1;
      isOther = true;
      dateStr = yr + '-' + pad2(mo === 0 ? 12 : mo) + '-' + pad2(dayNum);
    } else if (i >= firstDay + daysInMonth) {
      dayNum = i - firstDay - daysInMonth + 1;
      isOther = true;
      dateStr = yr + '-' + pad2(mo === 11 ? 1 : mo+2) + '-' + pad2(dayNum);
    } else {
      dayNum = i - firstDay + 1;
      dateStr = yr + '-' + pad2(mo+1) + '-' + pad2(dayNum);
    }
    if (isOther) cell.classList.add('other-month');
    if (dateStr === today && !isOther) cell.classList.add('today');
    if (dateStr === calSelectedDate) cell.classList.add('selected');

    var numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = dayNum;
    cell.appendChild(numEl);

    // 점 표시
    if (!isOther && evMap[dateStr]) {
      var dotsEl = document.createElement('div');
      dotsEl.className = 'cal-dots';
      evMap[dateStr].slice(0,3).forEach(function(type) {
        var d = document.createElement('div');
        d.className = 'cal-dot type-' + type;
        dotsEl.appendChild(d);
      });
      cell.appendChild(dotsEl);
    }

    (function(ds, isOth) {
      cell.addEventListener('click', function() {
        if (isOth) return;
        calSelectedDate = ds;
        renderCal();
        renderCalList(customers, ds);
      });
    })(dateStr, isOther);

    grid.appendChild(cell);
  }

  // 목록 렌더
  if (calSelectedDate) {
    renderCalList(customers, calSelectedDate);
  } else {
    renderCalList(customers, null); // 이번 달 전체
  }
}

function renderCalList(customers, selectedDate) {
  var yr = calCurrentYear, mo = calCurrentMonth;
  var listEl = document.getElementById('cal-list');
  var lblEl = document.getElementById('cal-list-label');
  if (!listEl) return;
  listEl.innerHTML = '';

  var events;
  if (selectedDate) {
    // 선택된 날의 모든 일정
    var all = getCalEvents(customers, yr, mo);
    // 다른 달 날짜도 포함 가능 — date 직접 비교
    var allAll = getCalEvents(customers, yr-1, 11).concat(getCalEvents(customers, yr, 0), getCalEvents(customers, yr, 1),
      getCalEvents(customers, yr, 2), getCalEvents(customers, yr, 3), getCalEvents(customers, yr, 4),
      getCalEvents(customers, yr, 5), getCalEvents(customers, yr, 6), getCalEvents(customers, yr, 7),
      getCalEvents(customers, yr, 8), getCalEvents(customers, yr, 9), getCalEvents(customers, yr, 10),
      getCalEvents(customers, yr, 11), getCalEvents(customers, yr+1, 0));
    events = getCalEvents(customers, yr, mo).filter(function(ev){ return ev.date === selectedDate; });
    var d = new Date(selectedDate);
    var DOW2 = ['일','월','화','수','목','금','토'];
    if (lblEl) lblEl.textContent = (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + DOW2[d.getDay()] + ') 일정';
  } else {
    events = getCalEvents(customers, yr, mo);
    if (lblEl) lblEl.textContent = (mo+1) + '월 전체 일정';
  }

  if (events.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:16px 0;font-size:13px;color:#B0A99F';
    empty.textContent = selectedDate ? '이 날 일정이 없습니다' : '이번 달 일정이 없습니다';
    listEl.appendChild(empty); return;
  }

  var DOW3 = ['일','월','화','수','목','금','토'];
  events.forEach(function(ev) {
    var d = new Date(ev.date);
    var row = document.createElement('div');
    row.className = 'cal-ev-row';

    var dateCol = document.createElement('div');
    dateCol.className = 'cal-ev-date';
    dateCol.innerHTML =
      '<span class="cal-ev-day">' + d.getDate() + '</span>' +
      '<span class="cal-ev-dow">' + DOW3[d.getDay()] + '</span>';

    var bar = document.createElement('div');
    bar.className = 'cal-ev-type type-' + ev.type;

    var info = document.createElement('div');

var currentChartPeriod = 'daily';

function renderChart(period) {
  if (period) currentChartPeriod = period;
  var allChart = loadCustomers();
  var customers = (currentUser && currentUser.role === 'staff') ? allChart.filter(function(c) { return (c.staffName||'마스터') === currentUser.name; }) : allChart;
  var now = new Date();
  var barsEl = document.getElementById('chart-bars'); barsEl.innerHTML = '';
  barsEl.style.padding = '4px 16px 0';
  barsEl.style.boxSizing = 'border-box';
  if(periodLabel) periodLabel.style.padding = '12px 16px 8px';
  var sumEl = document.getElementById('chart-summary'); sumEl.innerHTML = '';
  sumEl.style.padding = '0 4px';
  var periodLabel = document.getElementById('chart-period-label');
  var summaryLabel = document.getElementById('chart-summary-label');

  // 차트 탭 활성화
  document.querySelectorAll('.chart-tab').forEach(function(b) {
    var isOn = b.getAttribute('data-period') === currentChartPeriod;
    b.classList.toggle('on', isOn);
    b.style.color = '';
    b.style.borderBottom = '';
    b.style.fontWeight = '';
  });

  var periods = [], currentKey = '', labels = [];

  if (currentChartPeriod === 'daily') {
    // 최근 7일
    periodLabel.textContent = '일별 매출 (최근 7일)';
    summaryLabel.textContent = '오늘 요약';
    for (var i = 6; i >= 0; i--) {
      var d = new Date(now); d.setDate(d.getDate() - i);
      var key = d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
      periods.push({key: key, label: (d.getMonth()+1)+'/'+d.getDate()});
    }
    currentKey = todayStr();
  } else if (currentChartPeriod === 'weekly') {
    // 최근 6주
    periodLabel.textContent = '주별 매출 (최근 6주)';
    summaryLabel.textContent = '이번 주 요약';
    for (var i = 5; i >= 0; i--) {
      var d = new Date(now); d.setDate(d.getDate() - (i * 7));
      var weekStart = new Date(d); weekStart.setDate(d.getDate() - d.getDay());
      var weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
      var key = weekStart.getFullYear()+'-'+pad2(weekStart.getMonth()+1)+'-'+pad2(weekStart.getDate());
      periods.push({key: key, endKey: weekEnd.getFullYear()+'-'+pad2(weekEnd.getMonth()+1)+'-'+pad2(weekEnd.getDate()), label: (weekStart.getMonth()+1)+'/'+weekStart.getDate()});
    }
    var thisWeekStart = new Date(now); thisWeekStart.setDate(now.getDate() - now.getDay());
    currentKey = thisWeekStart.getFullYear()+'-'+pad2(thisWeekStart.getMonth()+1)+'-'+pad2(thisWeekStart.getDate());
  } else if (currentChartPeriod === 'monthly') {
    // 최근 6개월
    periodLabel.textContent = '월별 매출 (최근 6개월)';
    summaryLabel.textContent = '이번 달 요약';
    for (var i = 5; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      periods.push({key: d.getFullYear()+'-'+pad2(d.getMonth()+1), label:(d.getMonth()+1)+'월'});
    }
    currentKey = thisMonthStr();
  } else if (currentChartPeriod === 'yearly') {
    // 최근 3년
    periodLabel.textContent = '연별 매출 (최근 3년)';
    summaryLabel.textContent = '올해 요약';
    for (var i = 2; i >= 0; i--) {
      var y = now.getFullYear() - i;
      periods.push({key: String(y), label: y+'년'});
    }
    currentKey = String(now.getFullYear());
  }

  // 매출 계산
  var revenues = periods.map(function(p) {
    return customers.filter(function(c) {
      if (!c.date || c.stage === '상담') return false;
      if (currentChartPeriod === 'daily') return c.date === p.key;
      if (currentChartPeriod === 'weekly') return c.date >= p.key && c.date <= p.endKey;
      if (currentChartPeriod === 'monthly') return c.date.slice(0,7) === p.key;
      if (currentChartPeriod === 'yearly') return c.date.slice(0,4) === p.key;
    }).reduce(function(s,c) { return s+(Number(c.price)||0); }, 0);
  });

  var maxRev = Math.max.apply(null, revenues) || 1;
  periods.forEach(function(p, i) {
    var isCurrent = p.key === currentKey;
    var h = Math.round(revenues[i]/maxRev*100);
    var col = div('flex:1;display:flex;flex-direction:column;align-items:center;gap:4px', [
      span('font-size:11px;color:'+(isCurrent?'#282828':'#B0A99F')+';font-weight:'+(isCurrent?'700':'400'), revenues[i]>0?(revenues[i]/10000).toFixed(0)+'만':'0'),
      div('width:100%;background:'+(isCurrent?'#282828':'#B0A99F')+';height:'+(h||2)+'px', []),
      span('font-size:11px;color:'+(isCurrent?'#282828':'#B0A99F'), p.label)
    ]);
    barsEl.appendChild(col);
  });

  // 현재 기간 요약
  var currentCustomers = customers.filter(function(c) {
    if (!c.date) return false;
    if (currentChartPeriod === 'daily') return c.date === currentKey;
    if (currentChartPeriod === 'weekly') { var p = periods[periods.length-1]; return c.date >= p.key && c.date <= p.endKey; }
    if (currentChartPeriod === 'monthly') return c.date.slice(0,7) === currentKey;
    if (currentChartPeriod === 'yearly') return c.date.slice(0,4) === currentKey;
  });
  var curRev = currentCustomers.filter(function(c){return c.stage!=='상담';}).reduce(function(s,c){return s+(Number(c.price)||0);},0);
  var curPerf = currentCustomers.filter(function(c){return c.stage!=='상담';}).reduce(function(s,c){return s+(Number(c.performanceRevenue)||0);},0);
  var curCon = currentCustomers.filter(function(c){return c.stage!=='상담';}).length;
  var curCons = currentCustomers.length;
  var conv = curCons > 0 ? Math.round(curCon/curCons*100) : 0;

  [['전체 매출',fmt(curRev),'#282828'],['성과매출',fmt(curPerf),'#282828'],['상담 건수',curCons+'건','#282828'],['계약 건수',curCon+'건','#282828'],['전환율',conv+'%','#282828']].forEach(function(row) {
    sumEl.appendChild(div('display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #EEE6DC', [span('font-size:14px;color:#282828', row[0]), span('font-size:14px;font-weight:700;color:'+row[2], row[1])]));
  });
}

  if (estimates.length === 0) {
    var emptyEl = el('div', {style:'font-size:13px;color:#B0A99F;padding:10px 0;text-align:center', text:'저장된 견적서 없음'});
    estSec.appendChild(emptyEl);
    container.appendChild(estSec);
    return;
  }

  estimates.forEach(function(e, ei) {
    var cs = e.contractStatus || 'pending';
    var isLast = ei === estimates.length - 1;
    var card = el('div', {style:
      'border:1px solid #EEE6DC;border-radius:8px;padding:12px 14px;' +
      'margin-bottom:' + (isLast?'0':'8px') + ';background:#fff'
    });

    // 상단: 번호 + 상태 + 계약 배지
    var top = el('div', {style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px'});
    var noEl = el('div', {style:'display:flex;align-items:center;gap:6px'});
    var noSpan = el('span', {style:'font-size:12px;font-weight:700;color:#282828', text:e.no||'—'});
    var typeSpan = el('span', {style:
      'font-size:11px;color:#6B6B6B;border:1px solid #EEE6DC;' +
      'padding:1px 6px;border-radius:3px',
      text: STATUS_LABELS[e.status]||'가견적서'
    });
    noEl.appendChild(noSpan); noEl.appendChild(typeSpan);

    // 계약 상태 토글
    var contractBadge = el('button', {style:
      'font-size:11px;font-weight:700;border:none;cursor:pointer;' +
      'padding:3px 10px;border-radius:4px;font-family:inherit;' +
      'background:' + (cs==='contracted'?'#282828':'#FAF7F5') + ';' +
      'color:' + (cs==='contracted'?'#fff':'#6B6B6B'),
      text: CONTRACT_LABELS[cs]||'가견적'
    });
    var csArr = ['pending','contracted','rejected'];
    (function(entry, badge){
      badge.addEventListener('click', function(ev){
        ev.stopPropagation();
        var cur = entry.contractStatus || 'pending';
        var next = csArr[(csArr.indexOf(cur)+1)%csArr.length];
        entry.contractStatus = next;
        // dah_saved 업데이트
        try {
          var arr = JSON.parse(localStorage.getItem('dah_saved')||'[]');
          var idx = arr.findIndex(function(x){ return x.id === entry.id || x.no === entry.no; });
          if (idx>=0) { arr[idx].contractStatus = next; localStorage.setItem('dah_saved', JSON.stringify(arr)); }
        } catch(ex2){}
        badge.textContent = CONTRACT_LABELS[next];
        badge.style.background = next==='contracted'?'#282828':'#FAF7F5';
        badge.style.color = next==='contracted'?'#fff':'#6B6B6B';
      });
    })(e, contractBadge);

    top.appendChild(noEl); top.appendChild(contractBadge);
    card.appendChild(top);

    // 중단: 공간 + 금액
    var mid = el('div', {style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px'});
    var spaceEl = el('span', {style:'font-size:13px;color:#282828', text:e.space||'—'});
    var priceEl = el('span', {style:'font-size:14px;font-weight:700;color:#282828', text:(Number(e.price)||0).toLocaleString()+'원'});
    mid.appendChild(spaceEl); mid.appendChild(priceEl);
    card.appendChild(mid);

    // 원단 정보
    if (e.fabric) {
      var fabEl = el('div', {style:'font-size:12px;color:#B0A99F;margin-bottom:4px', text:'원단: ' + e.fabric});
      card.appendChild(fabEl);
    }

    // 하단: 저장일 + 담당자
    var bot = el('div', {style:'font-size:11px;color:#B0A99F'});
    var dateStr = e.savedAt ? e.savedAt.slice(0,10) : (e.date||'');
    bot.textContent = dateStr + (e.staffName ? ' · ' + e.staffName : '');
    card.appendChild(bot);

    estSec.appendChild(card);
  });

  container.appendChild(estSec);
}

function showEstimateHistory(customerName) {
  loadEstimates(customerName, function(estimates) {
    var body = document.getElementById('detail-body');
    var histSection = document.getElementById('estimate-history-section');
    if (histSection) histSection.remove();

    var section = el('div', {id:'estimate-history-section', style:'margin-top:14px'});
    section.appendChild(span('font-size:12px;color:#B0A99F;letter-spacing:1.2px;display:block;margin-bottom:8px', '📋 시공 이력 (' + estimates.length + '건)'));

    if (estimates.length === 0) {
      section.appendChild(span('font-size:14px;color:#B0A99F;display:block;text-align:center;padding:12px 0', '시공 이력이 없습니다'));
    } else {
      estimates.forEach(function(e) {
        var row = div('padding:10px;border:1px solid #EEE6DC;margin-bottom:6px;background:#FAF7F5', [
          div('display:flex;justify-content:space-between;margin-bottom:4px', [
            span('font-size:13px;font-weight:700', e.space || '—'),
            span('font-size:13px;color:#282828;font-weight:700', (Number(e.price)||0).toLocaleString()+'원')
          ]),
          e.product ? span('font-size:12px;color:#282828;display:block', '제품: ' + e.product) : null,
          e.fabric ? span('font-size:12px;color:#282828;display:block', '원단: ' + e.fabric) : null,
          (e.width && e.height) ? span('font-size:12px;color:#282828;display:block', '사이즈: ' + e.width + ' × ' + e.height + 'cm') : null,
          span('font-size:11px;color:#B0A99F;display:block;margin-top:4px', (e.date||'') + ' · ' + (e.stage||'') + ' · ' + (e.staff_name||''))
        ]);
        section.appendChild(row);
      });
    }
    body.appendChild(section);
  });
}

document.addEventListener('click', function(e) {
  if (e.target.id === 'cal-prev') {
    calCurrentMonth--;
    if (calCurrentMonth < 0) { calCurrentMonth = 11; calCurrentYear--; }
    calSelectedDate = null;
    var allCal2 = loadCustomers();
    var cust2 = (currentUser && currentUser.role === 'staff') ? allCal2.filter(function(c){ return (c.staffName||'마스터')===currentUser.name; }) : allCal2;
    renderCal();
  }
  if (e.target.id === 'cal-next') {
    calCurrentMonth++;
    if (calCurrentMonth > 11) { calCurrentMonth = 0; calCurrentYear++; }
    calSelectedDate = null;
    renderCal();
  }
});

(function() {
  try {
    var saved = JSON.parse(localStorage.getItem('dah_session') || 'null');

      var validStaffs = ['마스터'].concat(getStaffList());

})();
